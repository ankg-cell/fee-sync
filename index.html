<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>FEE SYNC - PORTAL</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Kanit:ital,wght@1,400;1,700&display=swap');
        :root { --bg: #f4f7f6; --text: #2d3748; --brand: #2b6cb0; --warn: #e53e3e; --premium: #d69e2e; --success: #38a169; }
        body { background: var(--bg); font-family: 'Segoe UI', sans-serif; color: var(--text); padding: 15px; margin: 0; }
        .focus-zone { max-width: 500px; margin: 0 auto; padding-bottom: 80px; }
        .brand-title { font-family: 'Kanit', sans-serif; font-size: 1.8rem; margin: 0; }
        .brand-fee { color: var(--brand); font-style: italic; }
        .brand-sync { color: var(--warn); font-style: italic; font-weight: 700; }
        .card { background: #fff; padding: 20px; border-radius: 15px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); margin-bottom: 20px; }
        .btn { width: 100%; padding: 14px; margin-top: 10px; border-radius: 8px; border: none; font-weight: bold; cursor: pointer; }
        .btn-primary { background: var(--brand); color: #fff; }
        #btn-invoice, #btn-assistant, #upgrade-banner, #app-container { display: none; }
        #btn-assistant { background: var(--premium); position: fixed; bottom: 20px; right: 20px; width: auto; padding: 15px 25px; border-radius: 50px; }
        #login-overlay { position: fixed; top:0; left:0; width:100%; height:100%; background:var(--bg); z-index: 2000; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .login-box { background: #fff; padding: 30px; border-radius: 15px; width: 85%; max-width: 350px; text-align: center; }
        input { width: 100%; padding: 12px; margin: 8px 0; border-radius: 8px; border: 1px solid #cbd5e0; box-sizing: border-box; }
        .ledger-row { display: flex; justify-content: space-between; padding: 10px; border-bottom: 1px solid #eee; }
    </style>
</head>
<body>
<div id="login-overlay">
    <div class="login-box">
        <h1 class="brand-title"><span class="brand-fee">FEE</span> <span class="brand-sync">SYNC</span></h1>
        <input type="email" id="auth-email" placeholder="Email">
        <input type="password" id="auth-pass" placeholder="Password">
        <button class="btn btn-primary" onclick="window.loginApp()">Login</button>
        <p id="login-error" style="color:var(--warn); font-size:0.8rem; display:none;"></p>
    </div>
</div>
<div id="app-container" class="focus-zone">
    <div style="display:flex; justify-content:space-between; align-items:center;">
        <h1 class="brand-title"><span class="brand-fee">FEE</span> <span class="brand-sync">SYNC</span></h1>
        <button onclick="window.logoutApp()" style="background:none; border:none; color:#718096; font-size:0.7rem;">LOGOUT</button>
    </div>
    <div id="biz-header" style="font-size:0.8rem; font-weight:bold; margin: 10px 0; color:var(--brand);">LOADING...</div>
    <div id="upgrade-banner" style="background:#fff5f5; color:var(--warn); padding:10px; border-radius:8px; font-size:0.75rem; text-align:center;">Upgrade to unlock Invoicing & AI!</div>
    <div class="card">
        <h3 id="ui-label">Activity</h3>
        <select id="main-person" style="width:100%; padding:12px; border-radius:8px;"><option value="General">Account General</option></select>
        <button class="btn btn-primary" id="btn-log" onclick="window.addEvent('Session')">Record Session</button>
        <button class="btn" id="btn-invoice" style="background:var(--premium);" onclick="alert('Generating Invoices...')">Generate Bill</button>
        <div style="display:flex; gap:10px; margin-top:15px;"><input type="number" id="pay-amt" placeholder="₹ Payment" style="flex:1;"><button class="btn" style="margin:0; background:var(--success); color:white;" onclick="window.addEvent('Payment')">Pay</button></div>
    </div>
    <div class="card"><h3>Cloud Ledger</h3><div id="ledger-box">Syncing...</div></div>
</div>
<button id="btn-assistant">✨ AI Assistant</button>
<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
    import { getFirestore, collection, doc, getDoc, addDoc, onSnapshot, query, orderBy } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";
    import { getAuth, signInWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-auth.js";
    const firebaseConfig = {
      apiKey: "AIzaSyBKdMRrtS1Bgjs4BXPZfM13oT3zM16Nt0g",
      authDomain: "fee-sync.firebaseapp.com",
      projectId: "fee-sync",
      storageBucket: "fee-sync.firebasestorage.app",
      messagingSenderId: "572245525299",
      appId: "1:572245525299:web:facc4e8e7ba5dd0a913446"
    };
    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const auth = getAuth(app);
    let currentUid = null;
    window.loginApp = () => signInWithEmailAndPassword(auth, document.getElementById('auth-email').value, document.getElementById('auth-pass').value).catch(e=>alert("Login Failed"));
    window.logoutApp = () => { signOut(auth); location.reload(); };
    onAuthStateChanged(auth, async (user) => {
        if (user) {
            currentUid = user.uid;
            const docSnap = await getDoc(doc(db, "businesses", currentUid));
            if (docSnap.exists()) {
                const data = docSnap.data();
                if (data.status === 'Suspended') {
                    document.body.innerHTML = `<div style="text-align:center; padding:50px; font-family:sans-serif;"><h1>🚫 Suspended</h1><p>Contact support@feesync.com</p></div>`;
                    return;
                }
                document.getElementById('login-overlay').style.display = 'none';
                document.getElementById('app-container').style.display = 'block';
                document.getElementById('biz-header').innerText = data.businessName.toUpperCase() + " | " + data.subscriptionPlan;
                let t = "Student";
                if(data.industryType === 'Sports') t = "Athlete";
                if(data.industryType === 'Gym') t = "Member";
                document.getElementById('ui-label').innerText = `Record ${t} Activity`;
                document.getElementById('btn-log').innerText = `Log ${t} Session`;
                if(data.subscriptionPlan !== 'Basic') document.getElementById('btn-invoice').style.display = 'block';
                if(data.subscriptionPlan === 'Pro') document.getElementById('btn-assistant').style.display = 'block';
                if(data.subscriptionPlan === 'Basic') document.getElementById('upgrade-banner').style.display = 'block';
                loadLedger();
            }
        }
    });
    window.addEvent = async (type) => {
        const amt = type === 'Payment' ? document.getElementById('pay-amt').value : 500;
        await addDoc(collection(db, "businesses", currentUid, "events"), { type, amt: Number(amt), ts: Date.now() });
        document.getElementById('pay-amt').value = '';
    };
    function loadLedger() {
        const q = query(collection(db, "businesses", currentUid, "events"), orderBy("ts", "desc"));
        onSnapshot(q, (snap) => {
            let h = '';
            snap.forEach(d => { h += `<div class="ledger-row"><span>${d.data().type}</span><b>₹${d.data().amt}</b></div>`; });
            document.getElementById('ledger-box').innerHTML = h || 'No records.';
        });
    }
</script>
</body>
</html>
