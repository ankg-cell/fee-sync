<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>FEE SYNC - CLIENT PORTAL</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Kanit:ital,wght@1,400;1,700&display=swap');
        :root { --bg: #f4f7f6; --text: #2d3748; --brand: #2b6cb0; --warn: #e53e3e; --premium: #d69e2e; --success: #38a169; }
        body { background: var(--bg); font-family: 'Segoe UI', sans-serif; color: var(--text); padding: 15px; margin: 0; }
        .focus-zone { max-width: 600px; margin: 0 auto; padding-bottom: 100px; }
        
        .header-top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 5px; }
        .brand-title { font-family: 'Kanit', sans-serif; font-size: 1.8rem; margin: 0; }
        .brand-fee { color: var(--brand); font-style: italic; font-weight: 400; }
        .brand-sync { color: var(--warn); font-style: italic; font-weight: 700; }
        #biz-header-name { font-size: 0.8rem; color: #718096; font-weight: bold; text-transform: uppercase; margin-bottom: 15px; border-bottom: 1px solid #cbd5e0; padding-bottom: 5px; }

        .card { background: #fff; padding: 20px; border-radius: 15px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); margin-bottom: 20px; }
        .btn { width: 100%; padding: 14px; margin-top: 10px; border-radius: 8px; border: none; font-weight: bold; cursor: pointer; font-size: 1rem; }
        .btn-primary { background: var(--brand); color: #fff; }
        .btn-success { background: var(--success); color: #fff; }
        
        /* HIDDEN BY DEFAULT - UNLOCKED BY PLAN */
        #btn-invoice, #btn-assistant, #upgrade-banner { display: none; }

        #btn-assistant { background: var(--premium); color: #000; position: fixed; bottom: 20px; right: 20px; width: auto; padding: 15px 25px; border-radius: 50px; z-index: 1000; box-shadow: 0 5px 15px rgba(0,0,0,0.2); }
        #upgrade-banner { background: #fff5f5; color: var(--warn); padding: 10px; border-radius: 8px; text-align: center; font-size: 0.75rem; margin-bottom: 15px; border: 1px dashed var(--warn); }

        .ledger-row { display: flex; justify-content: space-between; padding: 12px; border-bottom: 1px solid #edf2f7; align-items: center; }
        
        /* LOGIN OVERLAY */
        #login-overlay { position: fixed; top:0; left:0; width:100%; height:100%; background:var(--bg); z-index: 2000; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .login-box { background: #fff; padding: 30px; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); width: 85%; max-width: 350px; text-align: center; }
        input { width: 100%; padding: 12px; margin: 8px 0; border-radius: 8px; border: 1px solid #cbd5e0; box-sizing: border-box; }
    </style>
</head>
<body>

<div id="login-overlay">
    <div class="login-box">
        <h1 class="brand-title"><span class="brand-fee">FEE</span> <span class="brand-sync">SYNC</span></h1>
        <p style="color:#718096; font-size:0.8rem; margin-bottom: 20px;">Business Portal Login</p>
        <input type="email" id="auth-email" placeholder="Email">
        <input type="password" id="auth-pass" placeholder="Password">
        <button class="btn btn-primary" onclick="window.loginApp()">Login</button>
        <p id="login-error" style="color:var(--warn); font-size:0.8rem; display:none;"></p>
    </div>
</div>

<div class="focus-zone">
    <div class="header-top">
        <h1 class="brand-title"><span class="brand-fee">FEE</span> <span class="brand-sync">SYNC</span></h1>
        <button onclick="window.logoutApp()" style="background:none; border:none; color:#718096; font-size:0.7rem;">LOGOUT</button>
    </div>
    <div id="biz-header-name">IDENTIFYING TENANT...</div>
    <div id="upgrade-banner">⭐ You are on the Basic Plan. Upgrade to unlock Invoicing and AI!</div>

    <div class="card">
        <h3 id="ui-label-entry">Quick Entry</h3>
        <select id="main-person" style="width:100%; padding:12px; border-radius:8px; border:1px solid #cbd5e0;">
            <option value="General Client">General Account</option>
        </select>
        <button class="btn btn-primary" id="btn-log" onclick="window.addEvent('Session')">Log Session</button>
        <button class="btn" id="btn-invoice" style="background:var(--premium); color:black;" onclick="alert('Invoicing initialized...')">Generate Bill</button>
        
        <div style="display:flex; gap:10px; margin-top:15px;">
            <input type="number" id="pay-amt" placeholder="Payment (₹)" style="flex:1;">
            <button class="btn btn-success" style="margin-top:0;" onclick="window.addEvent('Payment')">Pay</button>
        </div>
    </div>

    <div class="card">
        <h3>Cloud Ledger</h3>
        <div id="ledger-box">Syncing with vault...</div>
    </div>
</div>

<button id="btn-assistant">✨ AI Assistant</button>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
    import { getFirestore, collection, doc, getDoc, addDoc, onSnapshot, query, orderBy } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";
    import { getAuth, signInWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-auth.js";

    const firebaseConfig = {
      apiKey: "AIzaSyBKdMRrtS1Bgjs4BXPZfM13oT3zM16Nt0g",
      authDomain: "fee-sync.firebaseapp.com",
      projectId: "fee-sync",
      storageBucket: "fee-sync.firebasestorage.app",
      messagingSenderId: "572245525299",
      appId: "1:572245525299:web:facc4e8e7ba5dd0a913446"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const auth = getAuth(app);

    let currentUid = null;
    let bizData = null;

    window.loginApp = () => {
        signInWithEmailAndPassword(auth, document.getElementById('auth-email').value, document.getElementById('auth-pass').value)
        .catch(e => { document.getElementById('login-error').innerText = "Login Failed"; document.getElementById('login-error').style.display='block'; });
    };
    window.logoutApp = () => { signOut(auth); location.reload(); };

    onAuthStateChanged(auth, async (user) => {
        if (user) {
            currentUid = user.uid;
            document.getElementById('login-overlay').style.display = 'none';
            await syncSaaSProfile();
        }
    });

    async function syncSaaSProfile() {
        const docSnap = await getDoc(doc(db, "businesses", currentUid));
        if (docSnap.exists()) {
            bizData = docSnap.data();
            document.getElementById('biz-header-name').innerText = bizData.businessName + " | " + bizData.subscriptionPlan;
            
            // Terminology Logic
            let term = "Student";
            if(bizData.industryType === 'Sports') term = "Athlete";
            if(bizData.industryType === 'Gym') term = "Member";
            if(bizData.industryType === 'Consultant') term = "Client";
            
            document.getElementById('ui-label-entry').innerText = `Log ${term} Activity`;
            document.getElementById('btn-log').innerText = `Record ${term} Session`;

            // Plan Fence Logic
            if(bizData.subscriptionPlan === 'Basic') document.getElementById('upgrade-banner').style.display = 'block';
            if(bizData.subscriptionPlan !== 'Basic') document.getElementById('btn-invoice').style.display = 'block';
            if(bizData.subscriptionPlan === 'Pro') document.getElementById('btn-assistant').style.display = 'block';

            loadLedger();
        } else {
            alert("No business profile found. Please contact Fee Sync HQ.");
        }
    }

    window.addEvent = async (type) => {
        const amt = type === 'Payment' ? document.getElementById('pay-amt').value : 500;
        if(!amt) return;
        await addDoc(collection(db, "businesses", currentUid, "events"), {
            type, amt: Number(amt), person: document.getElementById('main-person').value,
            ts: Date.now(), date_str: new Date().toLocaleDateString()
        });
        document.getElementById('pay-amt').value = '';
    };

    function loadLedger() {
        const q = query(collection(db, "businesses", currentUid, "events"), orderBy("ts", "desc"));
        onSnapshot(q, (snap) => {
            let h = '';
            snap.forEach(d => {
                const e = d.data();
                h += `<div class="ledger-row">
                    <span><b>${e.type}</b><br><small>${e.date_str}</small></span>
                    <span style="color:${e.type==='Payment'?'green':'black'}">₹${e.amt}</span>
                </div>`;
            });
            document.getElementById('ledger-box').innerHTML = h || 'No activity recorded.';
        });
    }
</script>
</body>
</html>
