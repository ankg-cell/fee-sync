<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fee Sync | Live Queue</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <style>
        :root { --blue: #0ea5e9; --navy: #0f172a; --bg: #f8fafc; }
        body { font-family: sans-serif; background: var(--bg); text-align: center; padding: 20px; color: var(--navy); }
        .card { background: white; padding: 30px; border-radius: 25px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); max-width: 400px; margin: auto; }
        .token { font-size: 5rem; font-weight: 900; color: var(--blue); margin: 10px 0; }
        .btn { background: var(--navy); color: white; border: none; padding: 15px 30px; border-radius: 12px; font-weight: 800; cursor: pointer; width: 100%; margin-top: 10px; }
        .btn-blue { background: var(--blue); }
        .hidden { display: none; }
        #sync-status { font-size: 0.8rem; margin-bottom: 10px; color: #64748b; }
    </style>
</head>
<body>

    <div id="setup">
        <h2>⚡ FEE SYNC</h2>
        <p>Live Queue Test</p>
        <button class="btn" onclick="init('doctor')">I AM RECEPTION</button>
        <button class="btn btn-blue" onclick="init('patient')">I AM PATIENT (#5)</button>
    </div>

    <div id="app" class="hidden">
        <div id="sync-status">● Connecting...</div>
        <div class="card">
            <p id="role-label">Current Token</p>
            <div class="token" id="token-val">0</div>
        </div>
        <button id="action-btn" class="btn btn-blue hidden" onclick="triggerNext()">CALL NEXT PATIENT</button>
    </div>

    <script>
        // PASTE YOUR ACTUAL FIREBASE CONFIG HERE
        const firebaseConfig = {
            apiKey: "AIzaSyBKdMRrtS1Bgjs4BXPZfM13oT3zM16Nt0g",
  authDomain: "fee-sync.firebaseapp.com",
            databaseURL: "
https://fee-sync-default-rtdb.firebaseio.com/",
  projectId: "fee-sync",
  storageBucket: "fee-sync.firebasestorage.app",
  messagingSenderId: "572245525299",
  appId: "1:572245525299:web:facc4e8e7ba5dd0a913446" 
                        };

        firebase.initializeApp(firebaseConfig);
        
        /* THE SAFECAR PATH: 
           This points to 'live_queue', which is NOT your 'businesses' folder. 
           This ensures zero conflict. */
        const db = firebase.database().ref('live_queue/clinic_001');

        let currentToken = 0;
        const patientToken = 5; 
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

        function playDing() {
            try {
                const osc = audioCtx.createOscillator();
                const gain = audioCtx.createGain();
                osc.connect(gain); gain.connect(audioCtx.destination);
                osc.frequency.setValueAtTime(880, audioCtx.currentTime);
                gain.gain.setValueAtTime(0, audioCtx.currentTime);
                gain.gain.linearRampToValueAtTime(0.5, audioCtx.currentTime + 0.1);
                gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.5);
                osc.start(); osc.stop(audioCtx.currentTime + 0.5);
                if (navigator.vibrate) navigator.vibrate(200);
            } catch(e) { console.log("Audio blocked"); }
        }

        function init(role) {
            document.getElementById('setup').classList.add('hidden');
            document.getElementById('app').classList.remove('hidden');

            // Listening to the cloud
            db.on('value', (snapshot) => {
                document.getElementById('sync-status').innerText = "● Live Sync Active";
                document.getElementById('sync-status').style.color = "#22c55e";
                
                const data = snapshot.val();
                if (data && data.current !== undefined) {
                    const newVal = data.current;
                    if (newVal > currentToken || currentToken === 0) {
                        currentToken = newVal;
                        document.getElementById('token-val').innerText = currentToken;
                        if (role === 'patient') playDing();
                    }
                }
            });

            if(role === 'doctor') {
                document.getElementById('action-btn').classList.remove('hidden');
            }
        }

function triggerNext() {
    console.log("Attempting to update...");
    db.set({ current: currentToken + 1 })
    .then(() => {
        alert("Success! Check your Firebase Console now.");
    })
    .catch((error) => {
        alert("FAILED: " + error.message);
    });
}
    </script>
</body>
</html>
