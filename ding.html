<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fee Sync | Live Queue</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <style>
        :root { --blue: #0ea5e9; --navy: #0f172a; --bg: #f8fafc; }
        body { font-family: sans-serif; background: var(--bg); text-align: center; padding: 20px; color: var(--navy); }
        .card { background: white; padding: 30px; border-radius: 25px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); max-width: 400px; margin: auto; }
        .token-display { font-size: 5rem; font-weight: 900; color: var(--blue); margin: 10px 0; }
        .my-number { font-size: 1.2rem; background: var(--navy); color: white; padding: 5px 15px; border-radius: 50px; display: inline-block; margin-bottom: 15px; }
        .btn { background: var(--navy); color: white; border: none; padding: 15px 30px; border-radius: 12px; font-weight: 800; cursor: pointer; width: 100%; margin-top: 10px; }
        .btn-blue { background: var(--blue); }
        .hidden { display: none; }
        #sync-status { font-size: 0.8rem; margin-bottom: 10px; color: #64748b; font-weight: bold; }
    </style>
</head>
<body>

    <div id="setup">
        <h2>⚡ FEE SYNC</h2>
        <p>Select your role for the test:</p>
        <button class="btn" onclick="init('doctor')">I AM RECEPTION</button>
        <hr style="margin: 20px 0; border: 0; border-top: 1px solid #ccc;">
        <p>Simulate Patient Token #:</p>
        <input type="number" id="token-input" value="5" style="padding: 10px; border-radius: 8px; border: 1px solid #ccc; width: 60px;">
        <button class="btn btn-blue" onclick="init('patient')">I AM PATIENT</button>
    </div>

    <div id="app" class="hidden">
        <div id="sync-status">● Connecting...</div>
        <div class="card">
            <div id="patient-header" class="hidden">
                <div class="my-number">My Token: #<span id="my-token-val">0</span></div>
            </div>
            <p id="role-label">Now Calling</p>
            <div class="token-display" id="now-calling-val">0</div>
            <p id="msg-box" style="font-weight: bold; color: var(--blue); min-height: 1.2em;"></p>
        </div>
        <button id="action-btn" class="btn btn-blue hidden" onclick="triggerNext()">CALL NEXT PATIENT</button>
    </div>

    <script>
        // PASTE YOUR ACTUAL FIREBASE CONFIG HERE
        const firebaseConfig = {
  apiKey: "AIzaSyBKdMRrtS1Bgjs4BXPZfM13oT3zM16Nt0g",

  authDomain: "fee-sync.firebaseapp.com",

  databaseURL: "https://fee-sync-default-rtdb.firebaseio.com",

  projectId: "fee-sync",

  storageBucket: "fee-sync.firebasestorage.app",

  messagingSenderId: "572245525299",

  appId: "1:572245525299:web:facc4e8e7ba5dd0a913446"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.database().ref('live_queue/clinic_001');

        let currentCalling = 0;
        let myAssignedToken = 0;
        let audioCtx;

        function playDing(type) {
            if (!audioCtx) return;
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.connect(gain); gain.connect(audioCtx.destination);
            
            // Tone logic: Higher = More urgent
            if (type === 'near') osc.frequency.setValueAtTime(440, audioCtx.currentTime); // Low A
            else if (type === 'next') osc.frequency.setValueAtTime(880, audioCtx.currentTime); // High A
            else osc.frequency.setValueAtTime(1200, audioCtx.currentTime); // Emergency

            gain.gain.setValueAtTime(0, audioCtx.currentTime);
            gain.gain.linearRampToValueAtTime(0.5, audioCtx.currentTime + 0.1);
            gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.5);
            osc.start(); osc.stop(audioCtx.currentTime + 0.5);
            if (navigator.vibrate) navigator.vibrate(type === 'now' ? 1000 : 200);
        }

        function init(role) {
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            document.getElementById('setup').classList.add('hidden');
            document.getElementById('app').classList.remove('hidden');

            if (role === 'patient') {
                myAssignedToken = parseInt(document.getElementById('token-input').value);
                document.getElementById('patient-header').classList.remove('hidden');
                document.getElementById('my-token-val').innerText = myAssignedToken;
            } else {
                document.getElementById('action-btn').classList.remove('hidden');
            }

            db.on('value', (snapshot) => {
                const status = document.getElementById('sync-status');
                status.innerText = "● LIVE SYNC ACTIVE";
                status.style.color = "#22c55e";
                
                const data = snapshot.val();
                if (data && data.current !== undefined) {
                    currentCalling = data.current;
                    document.getElementById('now-calling-val').innerText = currentCalling;

                    if (role === 'patient') {
                        checkMyTurn(currentCalling);
                    }
                }
            });
        }

        function checkMyTurn(now) {
            const msg = document.getElementById('msg-box');
            
            // Logic for the Patient Experience
            if (now === (myAssignedToken - 3)) {
                msg.innerText = "3 people ahead. Get ready!";
                playDing('near');
            } 
            else if (now === (myAssignedToken - 1)) {
                msg.innerText = "You are NEXT! Head to cabin.";
                playDing('next');
                alert("You are NEXT in line!");
            }
            else if (now === myAssignedToken) {
                msg.innerText = "IT IS YOUR TURN! Please enter.";
                playDing('now');
            }
            else if (now > myAssignedToken) {
                msg.innerText = "Your turn has passed.";
                msg.style.color = "red";
            }
            else {
                msg.innerText = ""; // Stay quiet for others
            }
        }

        function triggerNext() {
            db.set({ current: currentCalling + 1 });
        }
    </script>
</body>
</html>
