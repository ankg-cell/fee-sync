<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>FeeSync Pro | Dr. Pradeep</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <style>
        :root { --primary: #6366f1; --red: #ff4d4d; --dark: #0f172a; --card: #1e293b; --text: #f8fafc; --accent: #22c55e; }
        body { font-family: 'Inter', sans-serif; background: var(--dark); color: var(--text); margin: 0; display: flex; flex-direction: column; align-items: center; min-height: 100vh; }
        .header { width: 100%; padding: 25px 0; text-align: center; background: linear-gradient(180deg, #1e1b4b 0%, var(--dark) 100%); border-bottom: 1px solid rgba(255,255,255,0.1); }
        .logo { font-size: 2rem; font-weight: 900; letter-spacing: -2px; }
        .logo span { color: var(--red); }
        .main-card { background: var(--card); width: 92%; max-width: 420px; border-radius: 35px; padding: 30px 20px; margin: 20px auto; box-shadow: 0 25px 50px rgba(0,0,0,0.4); border: 1px solid rgba(255,255,255,0.05); text-align: center; }
        .token-hero { font-size: 7rem; font-weight: 900; line-height: 1; margin: 15px 0; color: #fff; }
        .ledger-panel { background: rgba(0,0,0,0.3); border-radius: 25px; padding: 20px; margin-top: 20px; display: grid; grid-template-columns: 1fr 1fr; gap: 15px; text-align: left; }
        .stat-label { font-size: 0.65rem; color: #94a3b8; text-transform: uppercase; font-weight: 800; }
        .stat-val { font-size: 1.3rem; font-weight: 800; color: var(--accent); }
        .btn { width: 100%; padding: 20px; border-radius: 20px; border: none; font-size: 1.1rem; font-weight: 800; cursor: pointer; transition: 0.2s; margin-top: 15px; }
        .btn-call { background: var(--primary); color: white; border-bottom: 4px solid #4338ca; }
        .btn-join { background: #fff; color: var(--dark); }
        .hidden { display: none !important; }
        #announcement { color: var(--red); font-weight: 800; margin-top: 15px; font-size: 1.1rem; text-transform: uppercase; }
        .admin-link { margin-top: 40px; font-size: 0.7rem; color: #475569; text-decoration: none; }
    </style>
</head>
<body>

    <div class="header">
        <div class="logo">FEE<span>SYNC</span></div>
        <div style="font-size: 0.7rem; color: var(--primary); font-weight: 800; letter-spacing: 2px;">DR. PRADEEP'S CLINIC</div>
    </div>

    <div id="doctor-view" class="main-card hidden">
        <div style="font-size: 0.7rem; color: #94a3b8; font-weight: 800;">RECEPTION CONTROL</div>
        <div class="token-hero" id="doc-token">0</div>
        <div class="ledger-panel">
            <div>
                <div class="stat-label">Daily Cash</div>
                <div class="stat-val" id="total-revenue">₹0</div>
            </div>
            <div>
                <div class="stat-label">Last Issued</div>
                <div class="stat-val" id="issued-count">0</div>
            </div>
        </div>
        <button class="btn btn-call" id="call-btn" onclick="callNext()">CALL NEXT PATIENT</button>
        <button class="btn" style="background:transparent; color:#64748b; font-size:0.8rem; text-decoration: underline;" onclick="resetAll()">End Day Reset</button>
    </div>

    <div id="patient-join-view" class="main-card hidden">
        <h2>Secure Your Token</h2>
        <p style="color: #94a3b8; font-size: 0.9rem; margin-bottom: 30px;">Join the live queue remotely.</p>
        <button class="btn btn-join" onclick="joinQueue()">GET TOKEN & ENABLE VOICE</button>
        <br>
        <a href="?role=doctor" class="admin-link">Staff Login</a>
    </div>

    <div id="patient-status-view" class="main-card hidden">
        <button id="audio-btn" style="background: #22c55e; color:white; border:none; padding:12px; border-radius:12px; width:100%; font-weight:800; cursor:pointer;" onclick="unlockAudio()">🔊 TAP TO ENABLE VOICE ALERTS</button>
        <div class="token-hero" id="pat-token">0</div>
        <div style="background: rgba(99, 102, 241, 0.1); padding: 20px; border-radius: 25px; border: 1px solid var(--primary);">
            <div style="font-size: 0.7rem; color: #94a3b8;">YOUR TICKET</div>
            <div style="font-size: 3.5rem; font-weight: 900; color: var(--primary);">#<span id="my-num">0</span></div>
        </div>
        <div id="announcement"></div>
    </div>

    <script>
        // FIREBASE CONFIG
        const firebaseConfig = {
              apiKey: "AIzaSyBKdMRrtS1Bgjs4BXPZfM13oT3zM16Nt0g",
  authDomain: "fee-sync.firebaseapp.com",
  databaseURL: "https://fee-sync-default-rtdb.firebaseio.com",
  projectId: "fee-sync",
  storageBucket: "fee-sync.firebasestorage.app",
  messagingSenderId: "572245525299",
  appId: "1:572245525299:web:facc4e8e7ba5dd0a913446"
            
            
            
            
            
            };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database().ref('live_queue/clinic_test');
        
        const params = new URLSearchParams(window.location.search);
        const isDoctor = params.get('role') === 'doctor';
        let myToken = parseInt(localStorage.getItem('fs_token')) || 0;
        let audioActive = false;
        let lastAlert = -1;

        function init() {
            // FIX: Explicitly check for isDoctor first to ensure the button shows
            if (isDoctor) {
                document.getElementById('doctor-view').classList.remove('hidden');
                document.getElementById('patient-join-view').classList.add('hidden');
                document.getElementById('patient-status-view').classList.add('hidden');
            } else if (myToken > 0) {
                document.getElementById('patient-status-view').classList.remove('hidden');
                document.getElementById('doctor-view').classList.add('hidden');
                document.getElementById('patient-join-view').classList.add('hidden');
            } else {
                document.getElementById('patient-join-view').classList.remove('hidden');
                document.getElementById('doctor-view').classList.add('hidden');
                document.getElementById('patient-status-view').classList.add('hidden');
            }
            
            // MASTER SYNC
            db.on('value', (snap) => {
                const data = snap.val() || { current: 0, last_issued: 0 };
                
                // Reset Logic
                if (data.current === 0 && data.last_issued === 0 && myToken > 0) {
                    localStorage.removeItem('fs_token');
                    location.reload();
                    return;
                }

                // Update UI based on who is looking
                if (isDoctor) {
                    document.getElementById('doc-token').innerText = data.current;
                    document.getElementById('issued-count').innerText = data.last_issued;
                    document.getElementById('total-revenue').innerText = "₹" + (data.current * 500);
                } else {
                    document.getElementById('pat-token').innerText = data.current;
                    if (myToken > 0) {
                        document.getElementById('my-num').innerText = myToken;
                        handleVoice(data.current);
                    }
                }
            });
        }

        function callNext() {
            const btn = document.getElementById('call-btn');
            btn.innerText = "Calling...";
            btn.disabled = true;
            
            db.child('current').transaction(c => (c || 0) + 1, () => {
                btn.innerText = "CALL NEXT PATIENT";
                btn.disabled = false;
            });
        }

        function joinQueue() {
            unlockAudio();
            db.child('last_issued').transaction(v => (v || 0) + 1, (err, comm, snap) => {
                if (comm) {
                    myToken = snap.val();
                    localStorage.setItem('fs_token', myToken);
                    location.reload();
                }
            });
        }

        function handleVoice(now) {
            const m = document.getElementById('announcement');
            const diff = myToken - now;
            if (diff === 3 && lastAlert !== 3) {
                m.innerText = "3 patients left";
                speak("Excuse me, there are only three patients left for your turn. Please stay nearby.");
                lastAlert = 3;
            } else if (diff === 0 && lastAlert !== 0) {
                m.innerText = "DR. IS CALLING YOU";
                speak("The doctor is calling you. Please go and have your consultation now.");
                lastAlert = 0;
            }
        }

        function unlockAudio() {
            audioActive = true;
            window.speechSynthesis.cancel();
            window.speechSynthesis.speak(new SpeechSynthesisUtterance("Voice active"));
            if(document.getElementById('audio-btn')) document.getElementById('audio-btn').style.display = "none";
        }

        function speak(t) {
            if (!audioActive) return;
            window.speechSynthesis.cancel();
            const u = new SpeechSynthesisUtterance(t);
            u.rate = 0.85;
            window.speechSynthesis.speak(u);
        }

        function resetAll() { if(confirm("Reset all data?")) db.set({ current: 0, last_issued: 0 }); }

        init();
    </script>
</body>
</html>
