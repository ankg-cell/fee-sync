<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>FeeSync Pro | Dr. Pradeep's Clinic</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <style>
        :root { --primary: #6366f1; --red: #ff4d4d; --dark: #0f172a; --card: #1e293b; --text: #f8fafc; --accent: #22c55e; }
        body { font-family: 'Inter', sans-serif; background: var(--dark); color: var(--text); margin: 0; display: flex; flex-direction: column; align-items: center; min-height: 100vh; padding-bottom: 40px; }
        
        .header { width: 100%; padding: 30px 0; text-align: center; background: linear-gradient(180deg, #1e1b4b 0%, var(--dark) 100%); }
        .logo { font-size: 2.2rem; font-weight: 900; letter-spacing: -2px; }
        .logo span { color: var(--red); }
        .clinic-tag { font-size: 0.8rem; letter-spacing: 3px; color: var(--primary); font-weight: 800; text-transform: uppercase; }

        .main-card { background: var(--card); width: 90%; max-width: 420px; border-radius: 40px; padding: 40px 24px; text-align: center; margin: 20px auto; box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5); border: 1px solid rgba(255,255,255,0.05); }
        .token-circle { width: 160px; height: 160px; border: 6px solid var(--primary); border-radius: 50%; margin: 20px auto; display: flex; flex-direction: column; align-items: center; justify-content: center; box-shadow: 0 0 30px rgba(99, 102, 241, 0.3); }
        .token-val { font-size: 5rem; font-weight: 900; color: #fff; line-height: 1; }
        
        /* Ledger & Audit Table */
        .ledger-panel { background: rgba(0,0,0,0.3); border-radius: 25px; padding: 20px; margin-top: 25px; display: grid; grid-template-columns: 1fr 1fr; gap: 15px; text-align: left; }
        .stat-val { font-size: 1.3rem; font-weight: 800; color: #fff; }
        .audit-log { width: 100%; margin-top: 20px; border-collapse: collapse; font-size: 0.8rem; text-align: left; background: rgba(255,255,255,0.03); border-radius: 15px; overflow: hidden; }
        .audit-log th { padding: 12px; color: #64748b; border-bottom: 1px solid rgba(255,255,255,0.05); }
        .audit-log td { padding: 12px; border-bottom: 1px solid rgba(255,255,255,0.05); }

        .btn { width: 100%; padding: 20px; border-radius: 24px; border: none; font-size: 1.1rem; font-weight: 800; cursor: pointer; transition: 0.3s; margin-top: 15px; }
        .btn-call { background: var(--primary); color: white; box-shadow: 0 10px 30px rgba(99, 102, 241, 0.4); }
        .btn-join { background: #fff; color: var(--dark); }
        .hidden { display: none !important; }
        #status-msg { color: var(--red); font-weight: 800; margin-top: 20px; }
    </style>
</head>
<body>

    <div class="header">
        <div class="logo">FEE<span>SYNC</span></div>
        <div class="clinic-tag">DR. PRADEEP'S CLINIC</div>
    </div>

    <div id="doctor-view" class="main-card hidden">
        <div style="font-size: 0.7rem; color: #22c55e; font-weight: 800;">● RECEPTION ACTIVE</div>
        <div class="token-circle"><div class="token-val" id="doc-current">0</div><div style="font-size: 0.6rem; color: var(--primary);">NOW CALLING</div></div>

        <div class="ledger-panel">
            <div><div style="font-size:0.6rem; color:#94a3b8">CASH AUDIT</div><div class="stat-val" id="total-revenue">₹0</div></div>
            <div><div style="font-size:0.6rem; color:#94a3b8">ISSUED</div><div class="stat-val" id="total-issued">0</div></div>
        </div>

        <button class="btn btn-call" onclick="callNext()">CALL NEXT PATIENT</button>

        <table class="audit-log">
            <thead><tr><th>TIME</th><th>TOKEN</th><th>FEE</th></tr></thead>
            <tbody id="audit-body"></tbody>
        </table>
        
        <button class="btn" style="background:transparent; color:#64748b; font-size:0.8rem" onclick="resetDay()">End of Day Reset</button>
    </div>

    <div id="patient-join-view" class="main-card hidden">
        <h2 style="margin:0">Live Check-in</h2>
        <p style="color: #94a3b8; font-size: 0.9rem; margin-bottom: 30px;">Get your digital token for Dr. Pradeep.</p>
        <button class="btn btn-join" onclick="joinQueue()">GET MY TOKEN</button>
    </div>

    <div id="patient-status-view" class="main-card hidden">
        <div class="token-circle"><div class="token-val" id="pat-current">0</div><div style="font-size: 0.6rem; color: var(--primary);">NOW CALLING</div></div>
        <div style="background: rgba(99, 102, 241, 0.1); padding: 25px; border-radius: 30px; border: 1px solid var(--primary);">
            <span style="color: #94a3b8; font-size: 0.8rem; font-weight: 700;">YOUR POSITION</span>
            <div style="font-size: 3.5rem; font-weight: 900; color: var(--primary);">#<span id="my-num">0</span></div>
        </div>
        <div id="status-msg"></div>
    </div>

    <script>
        // FIREBASE CONFIG
        const firebaseConfig = { 
              apiKey: "AIzaSyBKdMRrtS1Bgjs4BXPZfM13oT3zM16Nt0g",
  authDomain: "fee-sync.firebaseapp.com",
  databaseURL: "https://fee-sync-default-rtdb.firebaseio.com",
  projectId: "fee-sync",
  storageBucket: "fee-sync.firebasestorage.app",
  messagingSenderId: "572245525299",
  appId: "1:572245525299:web:facc4e8e7ba5dd0a913446"
            };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database().ref('live_queue/clinic_test');
        
        const FEE = 500;
        const params = new URLSearchParams(window.location.search);
        const role = params.get('role');
        let myToken = parseInt(localStorage.getItem('feesync_token')) || 0;

        // AUTH & VIEW ROUTING
        function updateView() {
            document.getElementById('doctor-view').classList.add('hidden');
            document.getElementById('patient-join-view').classList.add('hidden');
            document.getElementById('patient-status-view').classList.add('hidden');

            if (role === 'doctor') {
                document.getElementById('doctor-view').classList.remove('hidden');
            } else if (myToken > 0) {
                document.getElementById('patient-status-view').classList.remove('hidden');
                document.getElementById('my-num').innerText = myToken;
            } else {
                document.getElementById('patient-join-view').classList.remove('hidden');
            }
        }
        updateView();

        // SYNC LOGIC
        db.on('value', (snap) => {
            const data = snap.val() || { current: 0, last_issued: 0 };
            const current = data.current || 0;
            const issued = data.last_issued || 0;

            // BUG FIX: If database is reset to 0, force patient to join screen
            if (current === 0 && issued === 0 && myToken > 0) {
                localStorage.removeItem('feesync_token');
                myToken = 0;
                updateView();
            }

            if (role === 'doctor') {
                document.getElementById('doc-current').innerText = current;
                document.getElementById('total-issued').innerText = issued;
                document.getElementById('total-revenue').innerText = "₹" + (current * FEE);
                updateAuditLog(current);
            } else {
                document.getElementById('pat-current').innerText = current;
                if (myToken > 0) checkTurn(current);
            }
        });

        function joinQueue() {
            db.child('last_issued').transaction(v => (v || 0) + 1, (err, comm, snap) => {
                if (comm) {
                    myToken = snap.val();
                    localStorage.setItem('feesync_token', myToken);
                    updateView();
                }
            });
        }

        function callNext() {
            db.child('current').transaction(v => (v || 0) + 1);
        }

        function updateAuditLog(count) {
            const tbody = document.getElementById('audit-body');
            tbody.innerHTML = "";
            for(let i = count; i > 0 && i > count - 5; i--) {
                const row = `<tr><td>Today</td><td>#${i}</td><td>₹${FEE}</td></tr>`;
                tbody.innerHTML += row;
            }
        }

        function resetDay() {
            if(confirm("DANGER: This will reset all cash and tokens.")) {
                db.set({ current: 0, last_issued: 0 });
            }
        }

        function checkTurn(now) {
            const m = document.getElementById('status-msg');
            if (myToken === now) { m.innerText = "IT IS YOUR TURN!"; speak("It is your turn."); }
            else if (myToken < now) { m.innerText = "TURN PASSED"; m.style.color = "#64748b"; }
        }

        function speak(t) { window.speechSynthesis.speak(new SpeechSynthesisUtterance(t)); }
    </script>
</body>
</html>
