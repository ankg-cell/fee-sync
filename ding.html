<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FeeSync Pro | Dr. Pradeep</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <style>
        :root { --primary: #6366f1; --red: #ff4d4d; --dark: #0f172a; --card: #1e293b; --text: #f8fafc; }
        body { font-family: 'Inter', sans-serif; background: var(--dark); color: var(--text); margin: 0; display: flex; flex-direction: column; align-items: center; min-height: 100vh; }
        
        .header { width: 100%; padding: 30px 0; text-align: center; background: linear-gradient(180deg, #1e1b4b 0%, var(--dark) 100%); }
        .logo { font-size: 2.2rem; font-weight: 900; letter-spacing: -2px; }
        .logo span { color: var(--red); }
        .clinic-tag { font-size: 0.75rem; letter-spacing: 3px; color: var(--primary); font-weight: 800; text-transform: uppercase; }

        .main-card { background: var(--card); width: 90%; max-width: 400px; border-radius: 40px; padding: 40px 20px; text-align: center; margin-top: 20px; box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5); border: 1px solid rgba(255,255,255,0.05); }
        .token-display { font-size: 6rem; font-weight: 900; color: #fff; margin: 20px 0; }
        
        /* Dashboard Stats */
        .ledger-box { background: rgba(0,0,0,0.3); border-radius: 25px; padding: 20px; margin-top: 25px; display: grid; grid-template-columns: 1fr 1fr; gap: 15px; text-align: left; }
        .stat-label { font-size: 0.65rem; color: #94a3b8; text-transform: uppercase; font-weight: 700; }
        .stat-val { font-size: 1.2rem; font-weight: 800; color: #fff; }

        .btn { width: 100%; padding: 20px; border-radius: 20px; border: none; font-size: 1.1rem; font-weight: 800; cursor: pointer; margin-top: 20px; transition: 0.2s; }
        .btn-primary { background: var(--primary); color: white; }
        .btn-disabled { background: #334155; color: #64748b; cursor: not-allowed; }
        
        .hidden { display: none !important; }
        #msg { color: var(--red); font-weight: 700; margin-top: 15px; }
    </style>
</head>
<body>

    <div class="header">
        <div class="logo">FEE<span>SYNC</span></div>
        <div class="clinic-tag">DR. PRADEEP'S CLINIC</div>
    </div>

    <div id="patient-join-view" class="main-card hidden">
        <h2>Join Queue</h2>
        <p id="timer-status" style="color: #94a3b8;">Checking booking window...</p>
        <button id="join-btn" class="btn btn-disabled" disabled onclick="requestToken()">JOIN NOW</button>
    </div>

    <div id="doctor-dashboard" class="main-card hidden">
        <div style="font-size: 0.7rem; letter-spacing: 2px; color: #94a3b8;">NOW CALLING</div>
        <div class="token-display" id="doc-token">0</div>
        
        <div class="ledger-box">
            <div>
                <div class="stat-label">Daily Revenue</div>
                <div class="stat-val" id="total-revenue">₹0</div>
            </div>
            <div>
                <div class="stat-label">Tokens Issued</div>
                <div class="stat-val" id="issued-count">0</div>
            </div>
        </div>
        <button class="btn btn-primary" onclick="callNext()">CALL NEXT PATIENT</button>
        <button class="btn" style="background:transparent; color:#64748b; text-decoration:underline" onclick="resetDay()">Reset for Tomorrow</button>
    </div>

    <div id="patient-status-view" class="main-card hidden">
        <div style="font-size: 0.7rem; letter-spacing: 2px; color: #94a3b8;">NOW CALLING</div>
        <div class="token-display" id="pat-token">0</div>
        <div style="background: rgba(99, 102, 241, 0.1); padding: 15px; border-radius: 20px; border: 1px solid var(--primary);">
            <span style="color: #94a3b8; font-size: 0.8rem;">Your Token Number</span>
            <div style="font-size: 2.5rem; font-weight: 800; color: var(--primary);">#<span id="my-num">0</span></div>
        </div>
        <div id="msg"></div>
    </div>

    <script>
        // 1. CONFIG
        const firebaseConfig = {
              apiKey: "AIzaSyBKdMRrtS1Bgjs4BXPZfM13oT3zM16Nt0g",
  authDomain: "fee-sync.firebaseapp.com",
  databaseURL: "https://fee-sync-default-rtdb.firebaseio.com",
  projectId: "fee-sync",
  storageBucket: "fee-sync.firebasestorage.app",
  messagingSenderId: "572245525299",
  appId: "1:572245525299:web:facc4e8e7ba5dd0a913446"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database().ref('live_queue/clinic_test');
        
        const OPEN_TIME = 10; // 10:00 AM
        const CLOSE_TIME = 20; // 8:00 PM
        const FEE = 500;

        const urlParams = new URLSearchParams(window.location.search);
        const role = urlParams.get('role') || 'patient';
        let myNum = localStorage.getItem('myToken') || 0;

        // 2. ROUTING
        if (role === 'doctor') {
            document.getElementById('doctor-dashboard').classList.remove('hidden');
        } else if (myNum > 0) {
            showPatientStatus();
        } else {
            document.getElementById('patient-join-view').classList.remove('hidden');
            checkWindow();
        }

        // 3. FLASH SALE TIMER
        function checkWindow() {
            const hour = new Date().getHours();
            const btn = document.getElementById('join-btn');
            const status = document.getElementById('timer-status');

            if (hour >= OPEN_TIME && hour < CLOSE_TIME) {
                btn.disabled = false;
                btn.className = "btn btn-primary";
                status.innerText = "Booking is OPEN!";
            } else {
                status.innerText = "Booking opens at " + OPEN_TIME + ":00 AM";
            }
        }

        // 4. REMOTE TOKEN REQUEST (The Flash Sale)
        function requestToken() {
            db.child('last_issued').transaction((current) => {
                return (current || 0) + 1;
            }, (error, committed, snapshot) => {
                if (committed) {
                    myNum = snapshot.val();
                    localStorage.setItem('myToken', myNum);
                    location.reload();
                }
            });
        }

        // 5. LIVE SYNC
        db.on('value', (snap) => {
            const data = snap.val() || {};
            const current = data.current || 0;
            const issued = data.last_issued || 0;

            if (role === 'doctor') {
                document.getElementById('doc-token').innerText = current;
                document.getElementById('issued-count').innerText = issued;
                document.getElementById('total-revenue').innerText = "₹" + (current * FEE);
            } else {
                document.getElementById('pat-token').innerText = current;
                if (myNum > 0) updatePatientAlerts(current);
            }
        });

        function showPatientStatus() {
            document.getElementById('patient-join-view').classList.add('hidden');
            document.getElementById('patient-status-view').classList.remove('hidden');
            document.getElementById('my-num').innerText = myNum;
        }

        function callNext() {
            db.child('current').transaction(c => (c || 0) + 1);
        }

        function resetDay() {
            if(confirm("Clear ledger and queue?")) db.set({ current: 0, last_issued: 0 });
        }
    </script>
</body>
</html>
