<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fee Sync | Smart Queue</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <style>
        :root { --brand: #4f46e5; --brand-dark: #3730a3; --slate: #0f172a; --bg: #fdfdfd; --accent: #22c55e; }
        body { font-family: 'Inter', -apple-system, sans-serif; background: var(--bg); color: var(--slate); margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center; }
        
        /* Branding */
        .logo { font-size: 1.5rem; font-weight: 900; letter-spacing: -1px; margin-bottom: 30px; color: var(--brand); }
        .logo span { color: var(--slate); }

        /* Card Styling */
        .card { background: white; width: 100%; max-width: 380px; border-radius: 32px; padding: 40px 20px; box-shadow: 0 20px 50px rgba(0,0,0,0.04); border: 1px solid #f1f5f9; position: relative; }
        .status-dot { position: absolute; top: 20px; right: 20px; width: 10px; height: 10px; background: #cbd5e1; border-radius: 50%; }
        .status-online { background: var(--accent); box-shadow: 0 0 10px var(--accent); }

        /* Typography */
        h2 { font-size: 0.9rem; text-transform: uppercase; letter-spacing: 2px; color: #64748b; margin-bottom: 5px; }
        .token-num { font-size: 7rem; font-weight: 800; color: var(--slate); line-height: 1; margin: 20px 0; }
        .patient-info { background: #f1f5f9; padding: 10px 20px; border-radius: 100px; font-weight: 600; font-size: 0.9rem; display: inline-block; margin-bottom: 20px; }

        /* Buttons */
        .btn { width: 100%; max-width: 380px; padding: 20px; border-radius: 20px; border: none; font-size: 1.1rem; font-weight: 700; cursor: pointer; transition: all 0.2s; margin-top: 15px; }
        .btn-primary { background: var(--brand); color: white; box-shadow: 0 10px 20px rgba(79, 70, 229, 0.2); }
        .btn-primary:active { transform: scale(0.97); background: var(--brand-dark); }
        .btn-outline { background: white; border: 2px solid #e2e8f0; color: #64748b; }
        .btn-reset { background: transparent; color: #94a3b8; font-size: 0.8rem; margin-top: 50px; text-decoration: underline; }

        .hidden { display: none; }
        #msg { color: var(--brand); font-weight: 600; min-height: 1.5em; margin-top: 10px; }
    </style>
</head>
<body>

    <div class="logo">FEE<span>SYNC</span></div>

    <div id="setup-view">
        <div class="card">
            <h2>Select Dashboard</h2>
            <button class="btn btn-primary" onclick="startApp('doctor')">Clinic Reception</button>
            <div style="margin: 20px 0; color: #cbd5e1;">OR</div>
            <p style="font-size: 0.8rem; color: #64748b;">Simulate Patient Token:</p>
            <input type="number" id="token-in" value="5" style="width: 60px; padding: 10px; border: 1px solid #e2e8f0; border-radius: 10px; text-align: center; font-size: 1.1rem;">
            <button class="btn btn-outline" onclick="startApp('patient')">Patient View</button>
        </div>
    </div>

    <div id="main-view" class="hidden">
        <div class="card">
            <div id="dot" class="status-dot"></div>
            <div id="patient-tag" class="patient-info hidden">My Token: #<span id="my-num">0</span></div>
            <h2 id="view-title">Now Calling</h2>
            <div class="token-num" id="live-num">0</div>
            <div id="msg"></div>
        </div>

        <div id="doctor-controls" class="hidden">
            <button class="btn btn-primary" onclick="nextPatient()">Next Patient</button>
            <button class="btn btn-reset" onclick="resetDay()">End of Day: Reset Queue</button>
        </div>

        <div id="patient-controls" class="hidden">
            <p style="color: #64748b; font-size: 0.8rem;">Keep this page open. It will Ding automatically.</p>
        </div>
    </div>

    <script>
        // FIREBASE CONFIG - PASTE YOURS HERE
        const firebaseConfig = {
  apiKey: "AIzaSyBKdMRrtS1Bgjs4BXPZfM13oT3zM16Nt0g",

  authDomain: "fee-sync.firebaseapp.com",

  databaseURL: "https://fee-sync-default-rtdb.firebaseio.com",

  projectId: "fee-sync",

  storageBucket: "fee-sync.firebasestorage.app",

  messagingSenderId: "572245525299",

  appId: "1:572245525299:web:facc4e8e7ba5dd0a913446"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.database().ref('live_queue/clinic_test');

        let currentVal = 0;
        let myToken = 0;
        let role = '';
        let audioCtx;

        function playSound(freq, duration) {
            if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.connect(gain); gain.connect(audioCtx.destination);
            osc.frequency.value = freq;
            gain.gain.setValueAtTime(0, audioCtx.currentTime);
            gain.gain.linearRampToValueAtTime(0.5, audioCtx.currentTime + 0.1);
            gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + duration);
            osc.start(); osc.stop(audioCtx.currentTime + duration);
            if (navigator.vibrate) navigator.vibrate(200);
        }

        function startApp(userRole) {
            role = userRole;
            document.getElementById('setup-view').classList.add('hidden');
            document.getElementById('main-view').classList.remove('hidden');

            if (role === 'patient') {
                myToken = parseInt(document.getElementById('token-in').value);
                document.getElementById('patient-tag').classList.remove('hidden');
                document.getElementById('my-num').innerText = myToken;
                document.getElementById('patient-controls').classList.remove('hidden');
            } else {
                document.getElementById('doctor-controls').classList.remove('hidden');
            }

            // LISTEN TO CLOUD
            db.on('value', (snap) => {
                document.getElementById('dot').classList.add('status-online');
                const data = snap.val();
                if (data && data.current !== undefined) {
                    const newVal = data.current;
                    
                    // Logic for updates
                    if (newVal === 0 || newVal > currentVal) {
                        currentVal = newVal;
                        document.getElementById('live-num').innerText = currentVal;
                        if (role === 'patient') processPatientLogic(currentVal);
                    }
                }
            });
        }

        function processPatientLogic(now) {
            const msg = document.getElementById('msg');
            if (now === (myToken - 3)) {
                msg.innerText = "3 People Ahead. Get Ready!";
                playSound(440, 0.5); // Low Ding
            } else if (now === (myToken - 1)) {
                msg.innerText = "You are NEXT! Move to cabin.";
                playSound(880, 0.8); // Sharp Ding
                alert("Prepare to enter. You are next!");
            } else if (now === myToken) {
                msg.innerText = "IT IS YOUR TURN!";
                playSound(1200, 1.5); // Long Alert
            } else {
                msg.innerText = "";
            }
        }

        function nextPatient() {
            db.set({ current: currentVal + 1 });
        }

        function resetDay() {
            if (confirm("Reset queue to 0 for a new day?")) {
                db.set({ current: 0 }).then(() => location.reload());
            }
        }
    </script>
</body>
</html>
