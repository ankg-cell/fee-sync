<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fee Sync | Live Cloud Test</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <style>
        :root { --blue: #0ea5e9; --navy: #0f172a; --bg: #f8fafc; }
        body { font-family: sans-serif; background: var(--bg); text-align: center; padding: 20px; color: var(--navy); }
        .card { background: white; padding: 30px; border-radius: 25px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); max-width: 400px; margin: auto; }
        .token { font-size: 5rem; font-weight: 900; color: var(--blue); margin: 10px 0; }
        .btn { background: var(--navy); color: white; border: none; padding: 15px 30px; border-radius: 12px; font-weight: 800; cursor: pointer; width: 100%; margin-top: 10px; }
        .btn-blue { background: var(--blue); }
        .hidden { display: none; }
    </style>
</head>
<body>

    <div id="setup">
        <h2>⚡ FEE SYNC</h2>
        <p><b>Cloud Sync Test</b><br>Open this on two different phones!</p>
        <button class="btn" onclick="init('doctor')">I AM RECEPTION</button>
        <button class="btn btn-blue" onclick="init('patient')">I AM PATIENT (#5)</button>
    </div>

    <div id="app" class="hidden">
        <h3 id="role-title"></h3>
        <div class="card">
            <p id="status-label">Current Queue</p>
            <div class="token" id="token-val">0</div>
            <p id="instruction" style="font-size: 0.8rem; color: #64748b;"></p>
        </div>
        <button id="action-btn" class="btn btn-blue hidden" onclick="triggerNext()">CALL NEXT PATIENT</button>
    </div>

    <script>
        // PUBLIC TEST DATABASE (For your demo tonight)
        const firebaseConfig = { databaseURL: "https://feesync-test-default-rtdb.firebaseio.com/" };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database().ref('clinic_test_1');

        let currentToken = 0;
        const patientToken = 5;

        // Sound Logic
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        function playDing() {
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.frequency.setValueAtTime(880, audioCtx.currentTime);
            gain.gain.setValueAtTime(0, audioCtx.currentTime);
            gain.gain.linearRampToValueAtTime(0.5, audioCtx.currentTime + 0.1);
            gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.5);
            osc.start(); osc.stop(audioCtx.currentTime + 0.5);
            if (navigator.vibrate) navigator.vibrate(200);
        }

        function init(role) {
            document.getElementById('setup').classList.add('hidden');
            document.getElementById('app').classList.remove('hidden');

            // CLOUD LISTENER: This is what connects the two phones
            db.on('value', (snapshot) => {
                const data = snapshot.val();
                if (data) {
                    currentToken = data.current;
                    document.getElementById('token-val').innerText = currentToken;
                    
                    if (role === 'patient') {
                        playDing();
                        if (currentToken === (patientToken - 1)) {
                            alert("You are NEXT! Please head to the cabin.");
                        }
                    }
                }
            });

            if(role === 'doctor') {
                document.getElementById('role-title').innerText = "Reception Dashboard";
                document.getElementById('action-btn').classList.remove('hidden');
            } else {
                document.getElementById('role-title').innerText = "Your Token: #5";
                document.getElementById('instruction').innerText = "Phone will 'Ding' when the doctor clicks Next.";
            }
        }

        function triggerNext() {
            // This pushes the number to the cloud
            db.set({ current: currentToken + 1 });
        }
    </script>
</body>
</html>
