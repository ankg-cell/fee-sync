<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>FeeSync Pro | Dr. Pradeep</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <style>
        :root { --primary: #6366f1; --red: #ff4d4d; --dark: #0f172a; --card: #1e293b; --text: #f8fafc; }
        body { font-family: 'Segoe UI', Roboto, sans-serif; background: var(--dark); color: var(--text); margin: 0; display: flex; flex-direction: column; align-items: center; min-height: 100vh; overflow-x: hidden; }
        
        /* Header & Brand */
        .header { width: 100%; padding: 40px 0 20px; text-align: center; background: linear-gradient(to bottom, #1e1b4b, var(--dark)); }
        .logo { font-size: 2rem; font-weight: 900; letter-spacing: -2px; }
        .logo span { color: var(--red); }
        .clinic-tag { font-size: 0.8rem; letter-spacing: 3px; color: var(--primary); font-weight: 800; margin-top: 5px; }

        /* Modern Display */
        .main-card { background: var(--card); width: 90%; max-width: 400px; border-radius: 40px; padding: 50px 20px; text-align: center; margin-top: 20px; box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5); border: 1px solid rgba(255,255,255,0.05); }
        .status-badge { display: inline-block; padding: 6px 16px; border-radius: 100px; background: rgba(99, 102, 241, 0.1); color: var(--primary); font-size: 0.75rem; font-weight: 700; text-transform: uppercase; margin-bottom: 20px; border: 1px solid var(--primary); }
        .token-circle { width: 180px; height: 180px; border: 8px solid var(--primary); border-radius: 50%; margin: 0 auto 20px; display: flex; align-items: center; justify-content: center; font-size: 5.5rem; font-weight: 900; text-shadow: 0 0 30px var(--primary); }
        
        /* Ledger Integration Panel */
        .ledger-summary { background: rgba(0,0,0,0.2); margin: 20px -20px -50px; padding: 30px 20px; border-radius: 0 0 40px 40px; border-top: 1px solid rgba(255,255,255,0.05); }
        .stat-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .stat-box { text-align: left; padding: 10px; }
        .stat-label { font-size: 0.65rem; color: #94a3b8; text-transform: uppercase; }
        .stat-val { font-size: 1.1rem; font-weight: 700; color: #fff; }

        /* Action Buttons */
        .btn { width: 90%; max-width: 400px; padding: 22px; border-radius: 20px; border: none; font-size: 1.1rem; font-weight: 800; cursor: pointer; margin-top: 20px; transition: 0.3s; }
        .btn-call { background: var(--primary); color: white; box-shadow: 0 10px 20px rgba(99, 102, 241, 0.3); }
        .btn-join { background: #fff; color: var(--dark); }
        
        .hidden { display: none !important; }
        #announcement { color: var(--red); font-weight: 700; margin-top: 20px; font-size: 0.9rem; text-transform: uppercase; }
    </style>
</head>
<body>

    <div class="header">
        <div class="logo">FEE<span>SYNC</span></div>
        <div class="clinic-tag">DR. PRADEEP'S CLINIC</div>
    </div>

    <div id="join-view" class="main-card">
        <div class="status-badge">Remote Booking</div>
        <h3>Check-in from Home</h3>
        <p style="color: #94a3b8; font-size: 0.9rem;">Join the live queue and get notified when it's your turn.</p>
        <button class="btn btn-join" onclick="registerPatient()">GET MY TOKEN</button>
    </div>

    <div id="dashboard" class="main-card hidden">
        <div id="role-tag" class="status-badge">Live Queue</div>
        <div class="token-circle" id="token-val">0</div>
        <div id="my-token-info" class="hidden">
            <span style="color: #94a3b8">Your Entry:</span> <b id="assigned-val" style="color: var(--primary)">#0</b>
        </div>
        <div id="announcement"></div>

        <div id="doctor-ledger" class="ledger-summary hidden">
            <div class="stat-grid">
                <div class="stat-box">
                    <div class="stat-label">Today's Revenue</div>
                    <div class="stat-val" id="total-cash">₹0</div>
                </div>
                <div class="stat-box">
                    <div class="stat-label">Patients Seen</div>
                    <div class="stat-val" id="patient-count">0</div>
                </div>
            </div>
            <button class="btn btn-call" onclick="processNext()">CALL NEXT PATIENT</button>
        </div>
    </div>

    <script>
        // CONFIG (Replace with yours)
        const firebaseConfig = { 
              apiKey: "AIzaSyBKdMRrtS1Bgjs4BXPZfM13oT3zM16Nt0g",

  authDomain: "fee-sync.firebaseapp.com",

  databaseURL: "https://fee-sync-default-rtdb.firebaseio.com",

  projectId: "fee-sync",

  storageBucket: "fee-sync.firebasestorage.app",

  messagingSenderId: "572245525299",

  appId: "1:572245525299:web:facc4e8e7ba5dd0a913446"
        
        
        
        
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database().ref('businesses/dr_pradeep');

        let state = { current: 0, lastIssued: 0, revenue: 0, role: '', myNum: 0 };
        const CONSULT_FEE = 500;

        // Remote Registration Logic
        function registerPatient() {
            db.child('queue').transaction((q) => {
                if (q) {
                    q.lastIssued = (q.lastIssued || 0) + 1;
                    state.myNum = q.lastIssued;
                }
                return q;
            }, (err, committed, snap) => {
                if (committed) {
                    initApp('patient');
                }
            });
        }

        function initApp(userRole) {
            state.role = userRole;
            document.getElementById('join-view').classList.add('hidden');
            document.getElementById('dashboard').classList.remove('hidden');

            if (userRole === 'doctor') {
                document.getElementById('doctor-ledger').classList.remove('hidden');
                document.getElementById('role-tag').innerText = "Reception Dashboard";
            } else {
                document.getElementById('my-token-info').classList.remove('hidden');
                document.getElementById('assigned-val').innerText = "#" + state.myNum;
            }

            // Sync Data
            db.child('queue').on('value', (s) => {
                const data = s.val();
                state.current = data.current;
                document.getElementById('token-val').innerText = state.current;
                document.getElementById('total-cash').innerText = "₹" + (state.current * CONSULT_FEE);
                document.getElementById('patient-count').innerText = state.current;
                
                if(state.role === 'patient') checkNotifications();
            });
        }

        function processNext() {
            // LEDGER + QUEUE INTEGRATION
            db.child('queue/current').set(state.current + 1);
            // Here you would also push to the 'ledger' node in Firebase
        }

        function checkNotifications() {
            const diff = state.myNum - state.current;
            const msg = document.getElementById('announcement');
            if (diff === 1) {
                msg.innerText = "YOU ARE NEXT! MOVE TO CABIN.";
                // speak logic here...
            } else if (diff === 0) {
                msg.innerText = "IT IS YOUR TURN!";
            }
        }
    </script>
</body>
</html>
