<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fee Sync | Dr. Pradeep's Clinic</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <style>
        :root { --brand: #4f46e5; --red: #ef4444; --slate: #0f172a; --bg: #f8fafc; --accent: #22c55e; }
        body { font-family: 'Inter', -apple-system, sans-serif; background: var(--bg); color: var(--slate); margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center; min-height: 100vh; }
        
        /* Brand Identity */
        .logo { font-size: 1.8rem; font-weight: 900; letter-spacing: -1.5px; margin-bottom: 5px; color: var(--slate); margin-top: 20px; }
        .logo span { color: var(--red); }
        .clinic-name { font-size: 1.1rem; font-weight: 800; color: var(--brand); margin-bottom: 30px; letter-spacing: 0.5px; }

        /* Card System */
        .card { background: white; width: 100%; max-width: 360px; border-radius: 35px; padding: 45px 25px; box-shadow: 0 25px 60px rgba(0,0,0,0.06); border: 1px solid rgba(0,0,0,0.03); position: relative; text-align: center; }
        .status-dot { position: absolute; top: 25px; right: 25px; width: 12px; height: 12px; background: #cbd5e1; border-radius: 50%; transition: 0.3s; }
        .status-online { background: var(--accent); box-shadow: 0 0 15px var(--accent); }

        /* Queue Typography */
        h2 { font-size: 0.85rem; text-transform: uppercase; letter-spacing: 2.5px; color: #94a3b8; margin-bottom: 5px; font-weight: 700; }
        .token-num { font-size: 8rem; font-weight: 900; color: var(--slate); line-height: 1; margin: 20px 0; font-variant-numeric: tabular-nums; text-shadow: 2px 2px 0px #f1f5f9; }
        .patient-badge { background: #fef2f2; border: 1px solid #fee2e2; padding: 10px 22px; border-radius: 100px; font-weight: 800; font-size: 1rem; display: inline-block; margin-bottom: 25px; color: var(--red); }

        /* Professional Buttons */
        .btn { width: 100%; max-width: 360px; padding: 22px; border-radius: 22px; border: none; font-size: 1.15rem; font-weight: 800; cursor: pointer; transition: all 0.2s; margin-top: 15px; -webkit-tap-highlight-color: transparent; }
        .btn-primary { background: var(--slate); color: white; box-shadow: 0 15px 30px rgba(15, 23, 42, 0.2); }
        .btn-primary:active { transform: scale(0.95); background: #000; }
        .btn-outline { background: white; border: 2.5px solid #e2e8f0; color: #64748b; }
        .btn-reset { background: transparent; color: #94a3b8; font-size: 0.85rem; margin-top: 60px; text-decoration: underline; font-weight: 600; cursor: pointer; border: none; }

        .hidden { display: none; }
        #announcement-text { color: var(--red); font-weight: 800; font-size: 1.2rem; min-height: 1.5em; margin-top: 20px; letter-spacing: -0.5px; }
    </style>
</head>
<body>

    <div class="logo">FEE<span>SYNC</span></div>
    <div class="clinic-name">DR. PRADEEP'S CLINIC</div>

    <div id="setup-view">
        <div class="card">
            <h2>System Login</h2>
            <button class="btn btn-primary" onclick="launch('doctor')">Clinic Dashboard</button>
            <div style="margin: 30px 0; font-size: 0.8rem; color: #cbd5e1; font-weight: 900;">OR</div>
            <p style="font-size: 0.9rem; color: #64748b; margin-bottom: 12px; font-weight: 600;">Patient Token Number:</p>
            <input type="number" id="token-input" value="5" style="width: 80px; padding: 15px; border: 2px solid #e2e8f0; border-radius: 15px; text-align: center; font-size: 1.3rem; font-weight: 800; margin-bottom: 15px; outline-color: var(--brand);">
            <button class="btn btn-outline" onclick="launch('patient')">Join as Patient</button>
        </div>
    </div>

    <div id="app-view" class="hidden">
        <div class="card">
            <div id="connection-dot" class="status-dot"></div>
            <div id="patient-header" class="hidden">
                <div class="patient-badge">YOUR TOKEN: #<span id="my-token-display">0</span></div>
            </div>
            <h2>Now Calling</h2>
            <div class="token-num" id="live-token-val">0</div>
            <div id="announcement-text"></div>
        </div>

        <div id="doctor-zone" class="hidden" style="width: 100%; display: flex; flex-direction: column; align-items: center;">
            <button class="btn btn-primary" onclick="callNext()">Call Next Patient</button>
            <button class="btn btn-reset" onclick="triggerReset()">End of Day: Clear Queue</button>
        </div>

        <div id="patient-zone" class="hidden" style="margin-top: 25px; text-align: center; max-width: 300px;">
            <p style="color: #94a3b8; font-size: 0.85rem; line-height: 1.5; font-weight: 500;">
                <span style="color: var(--accent)">●</span> Voice assistance active.<br>Please keep your media volume up.
            </p>
        </div>
    </div>

    <script>
        // 1. DATABASE CONFIG (Replace with your actual keys)
        const firebaseConfig = {
   apiKey: "AIzaSyBKdMRrtS1Bgjs4BXPZfM13oT3zM16Nt0g",

  authDomain: "fee-sync.firebaseapp.com",

  databaseURL: "https://fee-sync-default-rtdb.firebaseio.com",

  projectId: "fee-sync",

  storageBucket: "fee-sync.firebasestorage.app",

  messagingSenderId: "572245525299",

  appId: "1:572245525299:web:facc4e8e7ba5dd0a913446"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.database().ref('live_queue/clinic_test');

        let currentActiveToken = 0;
        let myAssignedToken = 0;
        let userRole = '';
        let audioCtx;

        // 2. VOICE & SOUND ENGINE
        function playAlert(freq, type) {
            if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.connect(gain); gain.connect(audioCtx.destination);
            osc.frequency.value = freq;
            gain.gain.setValueAtTime(0, audioCtx.currentTime);
            gain.gain.linearRampToValueAtTime(0.4, audioCtx.currentTime + 0.1);
            gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.6);
            osc.start(); osc.stop(audioCtx.currentTime + 0.6);
            if (navigator.vibrate) navigator.vibrate(type === 'urgent' ? 1000 : 200);
        }

        function speakText(text) {
            if ('speechSynthesis' in window) {
                const utterance = new SpeechSynthesisUtterance(text);
                utterance.rate = 0.85; // Natural pace
                utterance.pitch = 1.1; // Friendly tone
                window.speechSynthesis.speak(utterance);
            }
        }

        // 3. APP LOGIC
        function launch(role) {
            userRole = role;
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            
            document.getElementById('setup-view').classList.add('hidden');
            document.getElementById('app-view').classList.remove('hidden');

            if (role === 'patient') {
                myAssignedToken = parseInt(document.getElementById('token-input').value);
                document.getElementById('patient-header').classList.remove('hidden');
                document.getElementById('my-token-display').innerText = myAssignedToken;
                document.getElementById('patient-zone').classList.remove('hidden');
            } else {
                document.getElementById('doctor-zone').classList.remove('hidden');
                document.getElementById('doctor-zone').style.display = 'flex';
            }

            db.on('value', (snap) => {
                document.getElementById('connection-dot').classList.add('status-online');
                const data = snap.val();
                if (data && data.current !== undefined) {
                    const cloudVal = data.current;
                    if (cloudVal === 0 || cloudVal > currentActiveToken) {
                        currentActiveToken = cloudVal;
                        document.getElementById('live-token-val').innerText = currentActiveToken;
                        if (userRole === 'patient') runPatientChecks(currentActiveToken);
                    }
                }
            });
        }

        function runPatientChecks(now) {
            const display = document.getElementById('announcement-text');
            
            if (now === (myAssignedToken - 3)) {
                display.innerText = "3 AHEAD • GET READY";
                playAlert(440, 'normal');
                speakText("Three patients remaining. Please get ready.");
            } 
            else if (now === (myAssignedToken - 1)) {
                display.innerText = "YOU ARE NEXT • MOVE NOW";
                playAlert(880, 'normal');
                speakText("You are next in line. Please get up and move towards the cabin now.");
                alert("DR. PRADEEP'S CLINIC: You are NEXT! Please move to the cabin.");
            }
            else if (now === myAssignedToken) {
                display.innerText = "IT IS YOUR TURN!";
                playAlert(1200, 'urgent');
                speakText("It is your turn. Please enter the doctors room.");
            } else {
                display.innerText = "";
            }
        }

        function callNext() {
            db.set({ current: currentActiveToken + 1 });
        }

        function triggerReset() {
            if (confirm("End of Day? This resets Dr. Pradeep's queue to 0.")) {
                db.set({ current: 0 }).then(() => location.reload());
            }
        }
    </script>
</body>
</html>
