<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FeeSync | Patient Queue</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <style>
        :root { --primary: #6366f1; --dark: #0f172a; --card: #1e293b; --text: #f8fafc; --accent: #22c55e; }
        body { font-family: 'Inter', sans-serif; background: var(--dark); color: var(--text); margin: 0; display: flex; flex-direction: column; align-items: center; min-height: 100vh; }
        .main-card { background: var(--card); width: 92%; max-width: 440px; border-radius: 40px; padding: 35px 24px; text-align: center; margin-top: 40px; box-shadow: 0 25px 50px rgba(0,0,0,0.5); }
        .token-hero { font-size: 5rem; font-weight: 900; color: #fff; margin: 10px 0; }
        input { width: 100%; padding: 18px; border-radius: 15px; border: 1px solid #334155; background: #0f172a; color: #fff; font-size: 1.1rem; margin-bottom: 15px; box-sizing: border-box; }
        .btn-join { width: 100%; padding: 22px; border-radius: 22px; border: none; font-size: 1.1rem; font-weight: 800; background: #fff; color: var(--dark); cursor: pointer; }
        .hidden { display: none !important; }
    </style>
</head>
<body>
    <div id="join-view" class="main-card">
        <h2>Clinic Check-in</h2>
        <input type="text" id="p-name" placeholder="Enter Full Name">
        <button class="btn-join" onclick="joinQueue()">GET MY TOKEN</button>
    </div>

    <div id="status-view" class="main-card hidden">
        <button id="voice-btn" onclick="unlockVoice()" style="background:var(--accent); color:white; border:none; padding:15px; border-radius:15px; width:100%; font-weight:800; margin-bottom:20px;">🔊 ENABLE VOICE ALERTS</button>
        <div style="font-size:0.7rem; color:var(--primary); font-weight:800;">NOW CALLING</div>
        <div class="token-hero" id="pat-current">0</div>
        <div style="background: rgba(99,102,241,0.1); padding: 25px; border-radius: 30px; border: 1px solid var(--primary);">
            <div id="display-name" style="font-weight: 800; color: var(--primary); text-transform: uppercase;"></div>
            <span style="color: #94a3b8; font-size: 0.75rem;">YOUR TOKEN</span>
            <div style="font-size: 3rem; font-weight: 900; color: var(--primary);">#<span id="my-num">0</span></div>
        </div>
        <div id="msg" style="margin-top:20px; font-weight:800; color:var(--primary);"></div>
    </div>

    <script>
        const firebaseConfig = { 
            
  apiKey: "AIzaSyBKdMRrtS1Bgjs4BXPZfM13oT3zM16Nt0g",
  authDomain: "fee-sync.firebaseapp.com",
  databaseURL: "https://fee-sync-default-rtdb.firebaseio.com",
  projectId: "fee-sync",
  storageBucket: "fee-sync.firebasestorage.app",
  messagingSenderId: "572245525299",
  appId: "1:572245525299:web:facc4e8e7ba5dd0a913446"
            
            
            
            
            };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database().ref('fee_sync_final');
        
        let myToken = parseInt(localStorage.getItem('fs_tk')) || 0;
        let myName = localStorage.getItem('fs_nm') || "";
        let audioActive = false;
        let lastSpeak = -1;

        if (myToken > 0) {
            document.getElementById('join-view').classList.add('hidden');
            document.getElementById('status-view').classList.remove('hidden');
            document.getElementById('display-name').innerText = myName;
            document.getElementById('my-num').innerText = myToken;
        }

        db.on('value', (snap) => {
            const data = snap.val() || { current: 0, last: 0 };
            if (data.current === 0 && data.last === 0) { localStorage.clear(); location.reload(); }
            document.getElementById('pat-current').innerText = data.current;
            if (myToken > 0) handleAlerts(data.current);
        });

        function joinQueue() {
            const name = document.getElementById('p-name').value;
            if(!name) return alert("Enter Name");
            db.transaction((data) => {
                data = data || { current: 0, last: 0, patients: {} };
                data.last++;
                if(!data.patients) data.patients = {};
                data.patients[data.last] = { name: name };
                return data;
            }, (err, comm, snap) => {
                if(comm) {
                    localStorage.setItem('fs_tk', snap.val().last);
                    localStorage.setItem('fs_nm', name);
                    location.reload();
                }
            });
        }

        function handleAlerts(now) {
            const diff = myToken - now;
            const m = document.getElementById('msg');
            if (diff === 3 && lastSpeak !== 3) {
                m.innerText = "3 patients left";
                speak(`Excuse me ${myName}, three patients left for your turn.`);
                lastSpeak = 3;
            } else if (diff === 0 && lastSpeak !== 0) {
                m.innerText = "DR. IS CALLING YOU";
                speak(`Doctor Pradeep is calling you now, ${myName}. Please go to the cabin.`);
                lastSpeak = 0;
            }
        }

        function unlockVoice() {
            audioActive = true;
            window.speechSynthesis.speak(new SpeechSynthesisUtterance("Voice Active"));
            document.getElementById('voice-btn').style.display = 'none';
        }

        function speak(t) {
            if(!audioActive) return;
            window.speechSynthesis.cancel();
            const u = new SpeechSynthesisUtterance(t);
            u.rate = 0.85; window.speechSynthesis.speak(u);
        }
