<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>FeeSync Master | Dr. Pradeep</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <style>
        :root { --primary: #6366f1; --red: #ff4d4d; --dark: #0f172a; --card: #1e293b; --text: #f8fafc; --accent: #22c55e; }
        body { font-family: 'Inter', sans-serif; background: var(--dark); color: var(--text); margin: 0; display: flex; flex-direction: column; align-items: center; min-height: 100vh; }
        
        .header { width: 100%; padding: 25px 0; text-align: center; background: linear-gradient(180deg, #1e1b4b 0%, var(--dark) 100%); border-bottom: 1px solid rgba(255,255,255,0.05); }
        .logo { font-size: 2rem; font-weight: 900; letter-spacing: -2px; }
        .logo span { color: var(--red); }
        
        /* Unified UI Components */
        .main-card { background: var(--card); width: 92%; max-width: 450px; border-radius: 35px; padding: 30px 20px; margin: 20px auto; box-shadow: 0 25px 50px rgba(0,0,0,0.4); border: 1px solid rgba(255,255,255,0.05); }
        .token-hero { font-size: 6rem; font-weight: 900; line-height: 1; margin: 15px 0; color: #fff; }
        
        /* Ledger Table (The High-Impact Look) */
        .ledger-panel { background: rgba(15, 23, 42, 0.5); border-radius: 25px; padding: 20px; margin-top: 15px; }
        .stat-row { display: flex; justify-content: space-between; margin-bottom: 10px; border-bottom: 1px solid rgba(255,255,255,0.05); padding-bottom: 10px; }
        .stat-label { font-size: 0.7rem; color: #94a3b8; text-transform: uppercase; font-weight: 700; }
        .stat-val { font-size: 1.1rem; font-weight: 800; color: var(--accent); }

        /* Status & Buttons */
        .btn { width: 100%; padding: 20px; border-radius: 20px; border: none; font-size: 1.1rem; font-weight: 800; cursor: pointer; transition: 0.2s; margin-top: 10px; }
        .btn-call { background: var(--primary); color: white; box-shadow: 0 10px 20px rgba(99, 102, 241, 0.3); }
        .btn-join { background: #fff; color: var(--dark); }
        .connection-status { font-size: 0.65rem; padding: 4px 12px; border-radius: 50px; background: #334155; margin-bottom: 15px; display: inline-block; }

        .hidden { display: none !important; }
        #announcement { color: var(--red); font-weight: 800; margin-top: 15px; font-size: 1rem; text-transform: uppercase; }
    </style>
</head>
<body>

    <div class="header">
        <div class="logo">FEE<span>SYNC</span></div>
        <div style="font-size: 0.7rem; color: var(--primary); font-weight: 800;">DR. PRADEEP'S MEDICAL SUITE</div>
    </div>

    <div id="doctor-view" class="main-card hidden">
        <div class="connection-status" id="doc-net">📡 ONLINE</div>
        <div style="font-size: 0.7rem; color: #94a3b8; font-weight: 800;">NOW CALLING</div>
        <div class="token-hero" id="doc-token">0</div>

        <div class="ledger-panel">
            <div class="stat-row">
                <div class="stat-label">Daily Collection</div>
                <div class="stat-val" id="total-cash">₹0</div>
            </div>
            <div class="stat-row">
                <div class="stat-label">Patient Count</div>
                <div class="stat-val" id="p-count">0</div>
            </div>
        </div>
        <button class="btn btn-call" onclick="callNext()">NEXT PATIENT (FEE: ₹500)</button>
        <button class="btn" style="background:transparent; color:#64748b; font-size:0.8rem" onclick="resetAll()">End Day Reset</button>
    </div>

    <div id="patient-join-view" class="main-card hidden">
        <h2>Secure Your Token</h2>
        <p style="color: #94a3b8; font-size: 0.9rem;">Join Dr. Pradeep's queue remotely. Internet required for check-in.</p>
        <button class="btn btn-join" onclick="joinQueue()">GET TOKEN & START VOICE</button>
    </div>

    <div id="patient-status-view" class="main-card hidden">
        <div class="connection-status" id="pat-net">🔄 REFRESHING EVERY 30S</div>
        <div class="token-hero" id="pat-token">0</div>
        <div style="background: rgba(99, 102, 241, 0.1); padding: 20px; border-radius: 25px; border: 1px solid var(--primary);">
            <div style="font-size: 0.7rem; color: #94a3b8;">YOUR TICKET</div>
            <div style="font-size: 3.5rem; font-weight: 900; color: var(--primary);">#<span id="my-num">0</span></div>
        </div>
        <div id="announcement"></div>
        <button class="btn" style="background: #22c55e; color: white;" onclick="forceSpeak()">🔊 TEST VOICE ALERTS</button>
    </div>

    <script>
        // FIREBASE CONFIG
        const firebaseConfig = {
            
              apiKey: "AIzaSyBKdMRrtS1Bgjs4BXPZfM13oT3zM16Nt0g",
  authDomain: "fee-sync.firebaseapp.com",
  databaseURL: "https://fee-sync-default-rtdb.firebaseio.com",
  projectId: "fee-sync",
  storageBucket: "fee-sync.firebasestorage.app",
  messagingSenderId: "572245525299",
  appId: "1:572245525299:web:facc4e8e7ba5dd0a913446"
            
            
            
            
            
            
            
            
         };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database().ref('live_queue/clinic_test');
        
        const params = new URLSearchParams(window.location.search);
        const isDoctor = params.get('role') === 'doctor';
        let myToken = parseInt(localStorage.getItem('fs_token')) || 0;
        let audioActive = false;

        // --- THE READ OPTIMIZER & INTERNET GUARD ---
        function initApp() {
            document.getElementById('doctor-view').classList.toggle('hidden', !isDoctor);
            document.getElementById('patient-join-view').classList.toggle('hidden', isDoctor || myToken > 0);
            document.getElementById('patient-status-view').classList.toggle('hidden', isDoctor || myToken === 0);

            if (isDoctor) {
                // DOCTOR: Full Realtime Listener (Always need accuracy for cash)
                db.on('value', (snap) => syncUI(snap.val()));
            } else if (myToken > 0) {
                // PATIENT: Selective Listening
                document.getElementById('my-num').innerText = myToken;
                startSmartSync();
            }
            
            // Internet Status Guard
            window.addEventListener('offline', () => setNetStatus("OFFLINE - CHECKING..."));
            window.addEventListener('online', () => setNetStatus("📡 ONLINE"));
        }

        function setNetStatus(txt) {
            const el = isDoctor ? 'doc-net' : 'pat-net';
            document.getElementById(el).innerText = txt;
        }

        function startSmartSync() {
            // Initial Read
            db.once('value').then(snap => {
                const data = snap.val();
                syncUI(data);
                
                // OPTIMIZATION: If far away (>5 tokens), check only every 30s. If close, go Realtime.
                const diff = myToken - data.current;
                if (diff > 5) {
                    setNetStatus("🔄 POWER SAVING MODE (30s)");
                    setTimeout(() => location.reload(), 30000); 
                } else {
                    setNetStatus("● LIVE SYNC ACTIVE");
                    db.on('value', (s) => syncUI(s.val()));
                }
            });
        }

        function syncUI(data) {
            if (!data) return;
            const current = data.current || 0;
            document.getElementById(isDoctor ? 'doc-token' : 'pat-token').innerText = current;
            
            if (isDoctor) {
                document.getElementById('p-count').innerText = current;
                document.getElementById('total-cash').innerText = "₹" + (current * 500);
            } else {
                handleAnnouncements(current);
            }
        }

        // --- ACTIONS ---
        function callNext() {
            db.child('current').transaction(v => (v || 0) + 1);
        }

        function joinQueue() {
            forceSpeak(); // Prime audio
            db.child('last_issued').transaction(v => (v || 0) + 1, (err, comm, snap) => {
                if (comm) {
                    myToken = snap.val();
                    localStorage.setItem('fs_token', myToken);
                    location.reload();
                }
            });
        }

        function handleAnnouncements(now) {
            const m = document.getElementById('announcement');
            const diff = myToken - now;
            if (diff === 3) {
                m.innerText = "3 patients left for your turn";
                speak("Excuse me, there are only three patients left for your turn. Please stay nearby.");
            } else if (diff === 0) {
                m.innerText = "DR. IS CALLING YOU";
                speak("It's your turn. The doctor is calling you. Please go and meet the doctor now.");
            }
        }

        function forceSpeak() {
            audioActive = true;
            window.speechSynthesis.cancel();
            window.speechSynthesis.speak(new SpeechSynthesisUtterance("Audio Active"));
        }

        function speak(t) {
            if (!audioActive) return;
            window.speechSynthesis.cancel();
            const u = new SpeechSynthesisUtterance(t);
            u.rate = 0.85;
            window.speechSynthesis.speak(u);
        }

        function resetAll() { if(confirm("Reset Day?")) db.set({ current: 0, last_issued: 0 }); }

        initApp();
    </script>
</body>
</html>
