<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>FeeSync Pro | Dr. Pradeep's Clinic</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <style>
        :root { --primary: #6366f1; --red: #ff4d4d; --dark: #0f172a; --card: #1e293b; --text: #f8fafc; --accent: #22c55e; }
        body { font-family: 'Inter', sans-serif; background: var(--dark); color: var(--text); margin: 0; display: flex; flex-direction: column; align-items: center; min-height: 100vh; padding-bottom: 40px; }
        .header { width: 100%; padding: 30px 0; text-align: center; background: linear-gradient(180deg, #1e1b4b 0%, var(--dark) 100%); }
        .logo { font-size: 2.2rem; font-weight: 900; letter-spacing: -2px; }
        .logo span { color: var(--red); }
        .clinic-tag { font-size: 0.8rem; letter-spacing: 3px; color: var(--primary); font-weight: 800; text-transform: uppercase; }
        .main-card { background: var(--card); width: 90%; max-width: 420px; border-radius: 40px; padding: 40px 24px; text-align: center; margin: 20px auto; box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5); border: 1px solid rgba(255,255,255,0.05); }
        .token-circle { width: 160px; height: 160px; border: 6px solid var(--primary); border-radius: 50%; margin: 20px auto; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .token-val { font-size: 5rem; font-weight: 900; color: #fff; line-height: 1; }
        .btn { width: 100%; padding: 20px; border-radius: 24px; border: none; font-size: 1.1rem; font-weight: 800; cursor: pointer; transition: 0.3s; margin-top: 15px; }
        .btn-call { background: var(--primary); color: white; }
        .btn-join { background: #fff; color: var(--dark); }
        .hidden { display: none !important; }
        #status-msg { color: var(--primary); font-weight: 800; margin-top: 20px; font-size: 1.1rem; }
        .test-voice-btn { background: transparent; color: #64748b; font-size: 0.7rem; border: 1px solid #334155; padding: 5px 10px; border-radius: 10px; margin-top: 10px; cursor: pointer; }
    </style>
</head>
<body>

    <div class="header">
        <div class="logo">FEE<span>SYNC</span></div>
        <div class="clinic-tag">DR. PRADEEP'S CLINIC</div>
    </div>

    <div id="doctor-view" class="main-card hidden">
        <div class="token-circle"><div class="token-val" id="doc-current">0</div></div>
        <button class="btn btn-call" onclick="callNext()">CALL NEXT PATIENT</button>
        <button class="btn" style="background:transparent; color:#64748b; font-size:0.8rem" onclick="resetDay()">End of Day Reset</button>
    </div>

    <div id="patient-join-view" class="main-card hidden">
        <h2 style="margin:0">Live Check-in</h2>
        <p style="color: #94a3b8; font-size: 0.9rem; margin-bottom: 30px;">Tap below to join the queue.</p>
        <button class="btn btn-join" onclick="joinQueue()">GET MY TOKEN</button>
    </div>

    <div id="patient-status-view" class="main-card hidden">
        <div class="token-circle"><div class="token-val" id="pat-current">0</div><div style="font-size: 0.6rem; color: var(--primary);">NOW CALLING</div></div>
        <div style="background: rgba(99, 102, 241, 0.1); padding: 25px; border-radius: 30px; border: 1px solid var(--primary);">
            <span style="color: #94a3b8; font-size: 0.8rem; font-weight: 700;">YOUR TOKEN</span>
            <div style="font-size: 3.5rem; font-weight: 900; color: var(--primary);">#<span id="my-num">0</span></div>
        </div>
        <div id="status-msg">Waiting for updates...</div>
        <button class="test-voice-btn" onclick="primeAndTest()">🔊 Tap to test voice alert</button>
    </div>

    <script>
        const firebaseConfig = { 
              apiKey: "AIzaSyBKdMRrtS1Bgjs4BXPZfM13oT3zM16Nt0g",
  authDomain: "fee-sync.firebaseapp.com",
  databaseURL: "https://fee-sync-default-rtdb.firebaseio.com",
  projectId: "fee-sync",
  storageBucket: "fee-sync.firebasestorage.app",
  messagingSenderId: "572245525299",
  appId: "1:572245525299:web:facc4e8e7ba5dd0a913446"
            
           };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database().ref('live_queue/clinic_test');

        const params = new URLSearchParams(window.location.search);
        const role = params.get('role');
        let myToken = parseInt(localStorage.getItem('feesync_token')) || 0;
        let lastAlerted = -1;

        function updateView() {
            document.getElementById('doctor-view').classList.toggle('hidden', role !== 'doctor');
            document.getElementById('patient-join-view').classList.toggle('hidden', role === 'doctor' || myToken > 0);
            document.getElementById('patient-status-view').classList.toggle('hidden', role === 'doctor' || myToken === 0);
            if (myToken > 0) document.getElementById('my-num').innerText = myToken;
        }
        updateView();

        // Voice Engine
        function speak(t) {
            window.speechSynthesis.cancel(); // Stop any overlapping speech
            const u = new SpeechSynthesisUtterance(t);
            u.rate = 0.9;
            u.pitch = 1;
            u.volume = 1;
            window.speechSynthesis.speak(u);
        }

        function primeAndTest() {
            speak("Voice alerts are active. You will be notified courteously.");
        }

        db.on('value', (snap) => {
            const data = snap.val() || { current: 0, last_issued: 0 };
            const current = data.current || 0;

            if (data.current === 0 && data.last_issued === 0) {
                localStorage.removeItem('feesync_token');
                myToken = 0;
                updateView();
            }

            if (role === 'doctor') {
                document.getElementById('doc-current').innerText = current;
            } else if (myToken > 0) {
                document.getElementById('pat-current').innerText = current;
                handleAlerts(current);
            }
        });

        function joinQueue() {
            // Prime voice immediately on first interaction
            speak("Joining queue.");
            db.transaction((data) => {
                data = data || { current: 0, last_issued: 0 };
                const next = Math.max(data.current, data.last_issued) + 1;
                data.last_issued = next;
                return data;
            }, (err, comm, snap) => {
                if (comm) {
                    myToken = snap.val().last_issued;
                    localStorage.setItem('feesync_token', myToken);
                    updateView();
                }
            });
        }

        function handleAlerts(now) {
            const m = document.getElementById('status-msg');
            const diff = myToken - now;

            if (diff === 3 && lastAlerted !== 3) {
                m.innerText = "3 patients left for your turn";
                speak("Excuse me, there are only three patients left for your turn. Please stay nearby.");
                lastAlerted = 3;
            } else if (diff === 0 && lastAlerted !== 0) {
                m.innerText = "DR. IS CALLING YOU";
                speak("The doctor is calling you now. Please get up and go to meet the doctor. Have a nice consultation.");
                lastAlerted = 0;
            } else if (diff > 3) {
                m.innerText = diff + " patients ahead of you";
            }
        }

        function callNext() { db.child('current').transaction(v => (v || 0) + 1); }
        function resetDay() { db.set({ current: 0, last_issued: 0 }); }
    </script>
</body>
</html>
