<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>FeeSync Pro | Dr. Pradeep</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <style>
        :root { --primary: #6366f1; --red: #ff4d4d; --dark: #0f172a; --card: #1e293b; --text: #f8fafc; --accent: #22c55e; }
        body { font-family: 'Inter', sans-serif; background: var(--dark); color: var(--text); margin: 0; display: flex; flex-direction: column; align-items: center; min-height: 100vh; }
        
        /* Branding Header */
        .header { width: 100%; padding: 30px 0; text-align: center; background: linear-gradient(180deg, #1e1b4b 0%, var(--dark) 100%); border-bottom: 1px solid rgba(255,255,255,0.05); }
        .logo { font-size: 2.2rem; font-weight: 900; letter-spacing: -2px; }
        .logo span { color: var(--red); }
        .clinic-tag { font-size: 0.8rem; letter-spacing: 3px; color: var(--primary); font-weight: 800; text-transform: uppercase; margin-top: 5px; }

        /* Component Cards */
        .main-card { background: var(--card); width: 90%; max-width: 420px; border-radius: 40px; padding: 40px 24px; text-align: center; margin: 20px auto; box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5); border: 1px solid rgba(255,255,255,0.05); }
        
        /* Token Displays */
        .token-circle { width: 180px; height: 180px; border: 6px solid var(--primary); border-radius: 50%; margin: 20px auto; display: flex; flex-direction: column; align-items: center; justify-content: center; box-shadow: 0 0 40px rgba(99, 102, 241, 0.2); }
        .token-val { font-size: 5.5rem; font-weight: 900; line-height: 1; color: #fff; }
        .token-label { font-size: 0.7rem; color: var(--primary); font-weight: 700; text-transform: uppercase; letter-spacing: 1px; }

        /* Doctor's Ledger Panel */
        .ledger-panel { background: rgba(15, 23, 42, 0.6); border-radius: 30px; padding: 25px; margin-top: 20px; display: grid; grid-template-columns: 1fr 1fr; gap: 20px; border: 1px solid rgba(255,255,255,0.05); }
        .stat-box { text-align: left; }
        .stat-label { font-size: 0.65rem; color: #94a3b8; text-transform: uppercase; font-weight: 800; margin-bottom: 5px; }
        .stat-val { font-size: 1.4rem; font-weight: 800; color: #fff; }

        /* Unified Buttons */
        .btn { width: 100%; padding: 22px; border-radius: 24px; border: none; font-size: 1.1rem; font-weight: 800; cursor: pointer; transition: 0.3s; margin-top: 15px; }
        .btn-call { background: var(--primary); color: white; box-shadow: 0 10px 30px rgba(99, 102, 241, 0.4); }
        .btn-join { background: #fff; color: var(--dark); box-shadow: 0 10px 30px rgba(255,255,255,0.1); }
        .btn-call:active, .btn-join:active { transform: scale(0.96); }
        .btn-reset { background: transparent; color: #64748b; font-size: 0.8rem; text-decoration: underline; margin-top: 30px; }

        .hidden { display: none !important; }
        #status-msg { color: var(--red); font-weight: 800; font-size: 1rem; margin-top: 20px; text-transform: uppercase; letter-spacing: 1px; }
        .badge { background: rgba(34, 197, 94, 0.1); color: var(--accent); padding: 5px 12px; border-radius: 100px; font-size: 0.7rem; font-weight: 800; margin-bottom: 10px; display: inline-block; border: 1px solid var(--accent); }
    </style>
</head>
<body>

    <div class="header">
        <div class="logo">FEE<span>SYNC</span></div>
        <div class="clinic-tag">DR. PRADEEP'S CLINIC</div>
    </div>

    <div id="doctor-view" class="main-card hidden">
        <div class="badge">RECEPTION MODE</div>
        <div class="token-circle">
            <span class="token-label">Calling</span>
            <div class="token-val" id="doc-current">0</div>
        </div>

        <div class="ledger-panel">
            <div class="stat-box">
                <div class="stat-label">Daily Cash</div>
                <div class="stat-val" id="total-revenue">₹0</div>
            </div>
            <div class="stat-box">
                <div class="stat-label">Total Tokens</div>
                <div class="stat-val" id="total-issued">0</div>
            </div>
        </div>

        <button class="btn btn-call" onclick="callNext()">CALL NEXT PATIENT</button>
        <button class="btn btn-reset" onclick="resetDay()">End of Day Reset</button>
    </div>

    <div id="patient-join-view" class="main-card hidden">
        <div class="badge">BOOKING OPEN</div>
        <h2 style="margin: 10px 0;">Remote Check-in</h2>
        <p style="color: #94a3b8; font-size: 0.9rem; margin-bottom: 30px;">Join the live queue from home and get notified when it is your turn.</p>
        <button class="btn btn-join" onclick="joinQueue()">GET MY TOKEN</button>
    </div>

    <div id="patient-status-view" class="main-card hidden">
        <div class="badge">LIVE TRACKING</div>
        <div class="token-circle">
            <span class="token-label">Now Calling</span>
            <div class="token-val" id="pat-current">0</div>
        </div>
        
        <div style="background: rgba(99, 102, 241, 0.15); padding: 25px; border-radius: 30px; border: 1px solid var(--primary); margin-top: 10px;">
            <span style="color: #94a3b8; font-size: 0.8rem; font-weight: 700; text-transform: uppercase;">Your Position</span>
            <div style="font-size: 3.5rem; font-weight: 900; color: var(--primary);">#<span id="my-token-num">0</span></div>
        </div>
        
        <div id="status-msg"></div>
    </div>

    <script>
        // FIREBASE CONFIG
        const firebaseConfig = {
  apiKey: "AIzaSyBKdMRrtS1Bgjs4BXPZfM13oT3zM16Nt0g",
  authDomain: "fee-sync.firebaseapp.com",
  databaseURL: "https://fee-sync-default-rtdb.firebaseio.com",
  projectId: "fee-sync",
  storageBucket: "fee-sync.firebasestorage.app",
  messagingSenderId: "572245525299",
  appId: "1:572245525299:web:facc4e8e7ba5dd0a913446"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database().ref('live_queue/clinic_test');
        
        const FEE = 500;
        const params = new URLSearchParams(window.location.search);
        const role = params.get('role'); // 'doctor'
        let myToken = localStorage.getItem('feesync_token');

        // ROUTING LOGIC
        if (role === 'doctor') {
            document.getElementById('doctor-view').classList.remove('hidden');
        } else if (myToken) {
            document.getElementById('patient-status-view').classList.remove('hidden');
            document.getElementById('my-token-num').innerText = myToken;
        } else {
            document.getElementById('patient-join-view').classList.remove('hidden');
        }

        // REAL-TIME SYNC
        db.on('value', (snap) => {
            const data = snap.val() || { current: 0, last_issued: 0 };
            const current = data.current || 0;
            const issued = data.last_issued || 0;

            if (role === 'doctor') {
                document.getElementById('doc-current').innerText = current;
                document.getElementById('total-issued').innerText = issued;
                document.getElementById('total-revenue').innerText = "₹" + (current * FEE);
            } else {
                document.getElementById('pat-current').innerText = current;
                if (myToken) checkMyTurn(current);
            }
        });

        // ACTIONS
        function joinQueue() {
            db.child('last_issued').transaction((val) => (val || 0) + 1, (err, committed, snap) => {
                if (committed) {
                    const newToken = snap.val();
                    localStorage.setItem('feesync_token', newToken);
                    location.reload();
                }
            });
        }

        function callNext() {
            db.child('current').transaction(val => (val || 0) + 1);
        }

        function resetDay() {
            if(confirm("DANGER: This will reset all cash and tokens. Proceed?")) {
                db.set({ current: 0, last_issued: 0 }).then(() => {
                    localStorage.removeItem('feesync_token');
                    location.reload();
                });
            }
        }

        function checkMyTurn(current) {
            const diff = myToken - current;
            const msg = document.getElementById('status-msg');
            if (diff === 1) {
                msg.innerText = "You are NEXT!";
                speak("You are next in line. Move to cabin.");
            } else if (diff === 0) {
                msg.innerText = "ENTER NOW";
                speak("It is your turn. Please enter the doctor's room.");
            } else if (diff < 0) {
                msg.innerText = "Turn Passed";
            }
        }

        function speak(t) { window.speechSynthesis.speak(new SpeechSynthesisUtterance(t)); }
    </script>
</body>
</html>
