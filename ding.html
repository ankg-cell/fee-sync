<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>FeeSync Patient</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <style>
        :root { --primary: #6366f1; --red: #ff4d4d; --dark: #0f172a; --card: #1e293b; --text: #f8fafc; --accent: #22c55e; }
        body { font-family: 'Inter', sans-serif; background: var(--dark); color: var(--text); margin: 0; display: flex; flex-direction: column; align-items: center; min-height: 100vh; }
        .header { width: 100%; padding: 25px 0; text-align: center; background: linear-gradient(180deg, #1e1b4b 0%, var(--dark) 100%); border-bottom: 1px solid rgba(255,255,255,0.1); }
        .logo { font-size: 2rem; font-weight: 900; letter-spacing: -2.5px; color: #fff; }
        .logo span { color: var(--red); }
        .main-card { background: var(--card); width: 92%; max-width: 440px; border-radius: 40px; padding: 35px 24px; text-align: center; margin: 30px auto; box-shadow: 0 25px 50px rgba(0,0,0,0.5); border: 1px solid rgba(255,255,255,0.05); }
        .token-circle { width: 160px; height: 160px; border: 6px solid var(--primary); border-radius: 50%; margin: 20px auto; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .token-val { font-size: 5rem; font-weight: 900; line-height: 1; color: #fff; }
        input { width: 100%; padding: 18px; border-radius: 15px; border: 1px solid #334155; background: #0f172a; color: #fff; font-size: 1.1rem; margin-bottom: 15px; box-sizing: border-box; outline: none; }
        .btn { width: 100%; padding: 22px; border-radius: 20px; border: none; font-size: 1.1rem; font-weight: 800; cursor: pointer; }
        .btn-join { background: #fff; color: var(--dark); }
        .hidden { display: none !important; }
    </style>
</head>
<body>
    <div class="header"><div class="logo">FEE<span>SYNC</span></div></div>
    
    <div id="join-view" class="main-card">
        <h2 style="margin:0 0 10px 0">Clinic Check-in</h2>
        <input type="text" id="p-name" placeholder="Enter Full Name">
        <button class="btn btn-join" onclick="joinQueue()">GET TOKEN & START VOICE</button>
    </div>

    <div id="status-view" class="main-card hidden">
        <button id="voice-lock" style="background:var(--accent); color:white; border:none; padding:15px; border-radius:15px; width:100%; font-weight:800; margin-bottom:15px;" onclick="unlockVoice()">🔊 ENABLE VOICE</button>
        <div class="token-circle"><div class="token-val" id="pat-current">0</div><div style="font-size: 0.6rem; color: var(--primary); font-weight: 800;">CALLING</div></div>
        <div style="background: rgba(99, 102, 241, 0.1); padding: 25px; border-radius: 30px; border: 1px solid var(--primary);">
            <div id="display-name" style="font-weight: 800; color: var(--primary); text-transform: uppercase;">...</div>
            <div style="font-size: 3rem; font-weight: 900; color: var(--primary);">#<span id="my-num">0</span></div>
        </div>
        <div id="status-msg" style="color:var(--red); font-weight:800; margin-top:20px; text-transform:uppercase;"></div>
    </div>

    <script>
        const firebaseConfig = {
              apiKey: "AIzaSyBKdMRrtS1Bgjs4BXPZfM13oT3zM16Nt0g",
  authDomain: "fee-sync.firebaseapp.com",
  databaseURL: "https://fee-sync-default-rtdb.firebaseio.com",
  projectId: "fee-sync",
  storageBucket: "fee-sync.firebasestorage.app",
  messagingSenderId: "572245525299",
  appId: "1:572245525299:web:facc4e8e7ba5dd0a913446"
            
            
            
            
            
            
            
            };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database().ref('fee_sync_final_v5'); // New path to ensure clean math

        let myToken = parseInt(localStorage.getItem('fs_tk')) || 0;
        let myName = localStorage.getItem('fs_nm') || "";
        let audioActive = false, lastSpeak = -1;

        // INITIAL VIEW STATE
        function syncDisplay() {
            const hasToken = (myToken > 0);
            document.getElementById('join-view').classList.toggle('hidden', hasToken);
            document.getElementById('status-view').classList.toggle('hidden', !hasToken);
            if(hasToken) {
                document.getElementById('my-num').innerText = myToken;
                document.getElementById('display-name').innerText = myName;
            }
        }
        syncDisplay();

        // REAL-TIME LISTENER
        db.on('value', (snap) => {
            const data = snap.val() || { current: 0, last: 0 };
            
            // SILENT RESET: No location.reload() to prevent flickering
            if (data.current === 0 && data.last === 0 && myToken > 0) {
                myToken = 0; myName = "";
                localStorage.clear();
                syncDisplay();
                return;
            }

            document.getElementById('pat-current').innerText = data.current;
            if (myToken > 0) handleAlerts(data.current);
        });

        function joinQueue() {
            const name = document.getElementById('p-name').value.trim();
            if (!name) return alert("Please enter your name");
            unlockVoice();
            
            db.transaction((data) => {
                data = data || { current: 0, last: 0, patients: {} };
                data.last = (data.last || 0) + 1;
                if(!data.patients) data.patients = {};
                data.patients[data.last] = { name: name };
                return data;
            }, (err, comm, snap) => {
                if (comm) { 
                    myToken = snap.val().last; 
                    myName = name;
                    localStorage.setItem('fs_tk', myToken); 
                    localStorage.setItem('fs_nm', myName); 
                    syncDisplay(); 
                }
            });
        }

        function handleAlerts(now) {
            const diff = myToken - now;
            const m = document.getElementById('status-msg');
            if (diff === 3 && lastSpeak !== 3) {
                speak(`Excuse me ${myName}, three patients left for your turn.`);
                lastSpeak = 3;
            } else if (diff === 0 && lastSpeak !== 0) {
                m.innerText = "DR. IS CALLING YOU";
                speak(`Doctor Pradeep is calling you now, ${myName}. Please go to the cabin.`);
                lastSpeak = 0;
            } else if (diff < 0) {
                m.innerText = "TURN PASSED";
            }
        }

        function unlockVoice() { audioActive = true; window.speechSynthesis.cancel(); window.speechSynthesis.speak(new SpeechSynthesisUtterance("Voice Ready")); document.getElementById('voice-lock').style.display = 'none'; }
        function speak(t) { if (!audioActive) return; window.speechSynthesis.cancel(); const u = new SpeechSynthesisUtterance(t); u.rate = 0.85; window.speechSynthesis.speak(u); }
    </script>
</body>
</html>
