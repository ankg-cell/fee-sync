<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>FeeSync Admin | Dr. Pradeep</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <style>
        :root { --primary: #6366f1; --red: #ff4d4d; --dark: #0f172a; --card: #1e293b; --text: #f8fafc; --accent: #22c55e; }
        body { font-family: 'Inter', sans-serif; background: var(--dark); color: var(--text); margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center; }
        .main-card { background: var(--card); width: 100%; max-width: 500px; border-radius: 30px; padding: 25px; box-shadow: 0 20px 40px rgba(0,0,0,0.4); border: 1px solid rgba(255,255,255,0.05); }
        .ledger-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 20px; }
        .stat-box { background: rgba(0,0,0,0.2); padding: 15px; border-radius: 15px; border: 1px solid rgba(255,255,255,0.05); }
        .stat-label { font-size: 0.6rem; color: #94a3b8; text-transform: uppercase; font-weight: 800; }
        .stat-val { font-size: 1.2rem; font-weight: 800; color: var(--accent); }
        
        /* Queue & Wallet List */
        .patient-list { margin-top: 20px; text-align: left; }
        .patient-item { display: flex; justify-content: space-between; align-items: center; padding: 15px; background: rgba(255,255,255,0.03); border-radius: 12px; margin-bottom: 10px; border-left: 4px solid #334155; }
        .active-p { border-left-color: var(--primary); background: rgba(99, 102, 241, 0.1); }
        .btn-call { width: 100%; padding: 20px; border-radius: 15px; border: none; background: var(--primary); color: white; font-weight: 800; font-size: 1rem; cursor: pointer; margin: 15px 0; }
        .wallet-tag { font-size: 0.75rem; font-weight: 700; color: var(--accent); background: rgba(34, 197, 94, 0.1); padding: 4px 8px; border-radius: 6px; }
    </style>
</head>
<body>
    <div class="main-card">
        <div style="font-weight: 900; color: var(--primary); margin-bottom: 20px;">DR. PRADEEP'S CLINIC</div>
        
        <div class="ledger-grid">
            <div class="stat-box"><div class="stat-label">DAILY CASH</div><div class="stat-val" id="total-rev">₹0</div></div>
            <div class="stat-box"><div class="stat-label">CALLING</div><div class="stat-val" id="cur-token">#0</div></div>
        </div>

        <div id="next-box" style="padding:15px; background:var(--primary); border-radius:15px; margin-bottom:15px;">
            <div style="font-size:0.6rem; font-weight:800; opacity:0.8;">UP NEXT</div>
            <div id="next-name" style="font-size:1.3rem; font-weight:900;">...</div>
        </div>

        <button class="btn-call" onclick="callNext()">PROCESS & CALL NEXT</button>

        <div class="patient-list" id="queue-list">
            <div class="stat-label">Live Waiting List</div>
            </div>

        <button onclick="fullReset()" style="background:transparent; color:#64748b; border:none; margin-top:30px; text-decoration:underline; font-size:0.7rem; cursor:pointer; width:100%;">Reset All Data</button>
    </div>

    <script>
        const firebaseConfig = {
              apiKey: "AIzaSyBKdMRrtS1Bgjs4BXPZfM13oT3zM16Nt0g",
  authDomain: "fee-sync.firebaseapp.com",
  databaseURL: "https://fee-sync-default-rtdb.firebaseio.com",
  projectId: "fee-sync",
  storageBucket: "fee-sync.firebasestorage.app",
  messagingSenderId: "572245525299",
  appId: "1:572245525299:web:facc4e8e7ba5dd0a913446"
            
            
            
            
            
            };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database().ref('fee_sync_v4');

        db.on('value', (snap) => {
            const data = snap.val() || { current: 0, last: 0, patients: {} };
            document.getElementById('cur-token').innerText = "#" + data.current;
            document.getElementById('total-rev').innerText = "₹" + (data.current * 500);
            
            const nextIdx = data.current + 1;
            document.getElementById('next-name').innerText = (data.patients && data.patients[nextIdx]) ? data.patients[nextIdx].name : "No more patients";

            // Render Queue List
            const list = document.getElementById('queue-list');
            list.innerHTML = `<div class="stat-label" style="margin-bottom:10px;">Waiting List</div>`;
            if (data.patients) {
                Object.keys(data.patients).forEach(token => {
                    if (token >= data.current) {
                        const p = data.patients[token];
                        const isActive = (token == data.current) ? 'active-p' : '';
                        list.innerHTML += `
                            <div class="patient-item ${isActive}">
                                <div><b>#${token}</b> ${p.name}</div>
                                <div class="wallet-tag">Wallet: ₹500</div>
                            </div>`;
                    }
                });
            }
        });

        function callNext() {
            db.transaction((data) => {
                data = data || { current: 0, last: 0 };
                if (data.current < data.last) data.current++;
                return data;
            });
        }
        function fullReset() { if(confirm("Clear ledger?")) db.set({ current: 0, last: 0, patients: {} }); }
    </script>
</body>
</html>
