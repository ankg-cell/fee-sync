<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fee Sync | Clinic Speed-Log</title>
    <style>
        :root { --med-blue: #0f172a; --med-accent: #3b82f6; --bg: #f1f5f9; --white: #ffffff; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); margin: 0; text-align: center; }
        
        .header { background: var(--med-blue); color: white; padding: 20px; }
        .day-total { font-size: 2.5rem; font-weight: 800; margin: 10px 0; }
        .day-label { font-size: 0.8rem; text-transform: uppercase; opacity: 0.8; letter-spacing: 1px; }

        .container { padding: 20px; max-width: 400px; margin: auto; }

        /* SPEED BUTTONS */
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-top: 20px; }
        .log-btn { background: var(--white); border: 2px solid #e2e8f0; padding: 25px 10px; border-radius: 20px; cursor: pointer; transition: 0.2s; }
        .log-btn:active { transform: scale(0.95); background: #dbeafe; }
        .log-btn div { font-weight: 800; font-size: 1.2rem; color: var(--med-blue); }
        .log-btn small { color: #64748b; font-weight: 600; }

        .custom-log { background: var(--white); margin-top: 15px; padding: 20px; border-radius: 20px; border: 2px solid #e2e8f0; }
        input { width: 100%; border: none; font-size: 1.2rem; font-weight: 700; text-align: center; outline: none; }
        .btn-main { background: var(--med-accent); color: white; width: 100%; padding: 15px; border-radius: 12px; border: none; font-weight: 800; margin-top: 10px; }

        .history { text-align: left; margin-top: 30px; }
        .history-item { background: white; padding: 12px 15px; border-radius: 10px; margin-bottom: 8px; display: flex; justify-content: space-between; align-items: center; border-left: 4px solid var(--med-accent); }
    </style>
</head>
<body>

    <div class="header">
        <div class="day-label">Total Collection Today</div>
        <div class="day-total">₹<span id="grand-total">0</span></div>
        <div id="visit-count" style="font-size: 0.9rem; opacity: 0.8;">0 Patients Seen</div>
    </div>

    <div class="container">
        <div class="grid">
            <div class="log-btn" onclick="quickLog(500, 'Consultation')">
                <small>CONSULT</small>
                <div>₹500</div>
            </div>
            <div class="log-btn" onclick="quickLog(200, 'Follow-up')">
                <small>FOLLOW-UP</small>
                <div>₹200</div>
            </div>
        </div>

        <div class="custom-log">
            <input type="number" id="custom-amt" placeholder="Other Amount (₹)">
            <button class="btn-main" onclick="customLog()">Log Procedure</button>
        </div>

        <div class="history">
            <h3 style="font-size: 0.9rem; color: #64748b;">RECENT LOGS</h3>
            <div id="log-list"></div>
        </div>
    </div>

    <script>
        let total = 0;
        let count = 0;

        function quickLog(amt, type) {
            total += amt;
            count++;
            updateUI(amt, type);
        }

        function customLog() {
            const amt = parseInt(document.getElementById('custom-amt').value);
            if (!amt) return;
            total += amt;
            count++;
            updateUI(amt, 'Procedure');
            document.getElementById('custom-amt').value = '';
        }
