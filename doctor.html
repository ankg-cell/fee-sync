<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fee Sync | Dr. Pradeep's Clinic</title>
    <style>
        :root { --navy: #0f172a; --royal: #1e40af; --accent: #ef4444; --success: #22c55e; --bg: #f8fafc; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); margin: 0; color: var(--navy); display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        
        /* HEADER & BRANDING */
        .brand-band { 
            background: linear-gradient(135deg, var(--navy) 0%, var(--royal) 100%); 
            padding: 20px 20px 50px 20px; color: white; text-align: center;
            border-bottom-left-radius: 30px; border-bottom-right-radius: 30px;
        }
        .logo-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; }
        .logo { font-weight: 900; font-size: 1.1rem; }
        .logo span { color: var(--accent); }
        .clinic-tag { font-size: 0.65rem; background: rgba(255,255,255,0.1); padding: 4px 10px; border-radius: 6px; font-weight: 700; }

        .main-total { font-size: 3rem; font-weight: 900; margin: 5px 0; }
        .label { font-size: 0.65rem; text-transform: uppercase; letter-spacing: 1.5px; opacity: 0.7; }

        /* MODE SWITCHER */
        .mode-toggle { 
            display: flex; background: white; margin: -25px 30px 0 30px; 
            padding: 5px; border-radius: 15px; box-shadow: 0 10px 20px rgba(0,0,0,0.05);
            z-index: 10; position: relative;
        }
        .mode-btn { 
            flex: 1; padding: 10px; border: none; background: none; 
            font-size: 0.75rem; font-weight: 800; border-radius: 10px; cursor: pointer; color: #64748b;
        }
        .mode-btn.active { background: var(--royal); color: white; }

        /* CONTENT AREAS */
        .content { flex: 1; padding: 30px 20px; overflow-y: auto; }
        .hidden { display: none; }

        /* EXPRESS MODE (High Volume) */
        .btn-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        .speed-card { 
            background: white; border: 1px solid #e2e8f0; padding: 20px; 
            border-radius: 20px; text-align: center; cursor: pointer;
        }
        .speed-card h3 { margin: 0; font-size: 1.4rem; color: var(--navy); }
        .speed-card p { margin: 5px 0 0 0; font-size: 0.65rem; font-weight: 700; color: #94a3b8; text-transform: uppercase; }

        /* PATIENT MODE (Low Volume / Therapy) */
        .patient-card { 
            background: white; border-radius: 20px; padding: 15px; 
            margin-bottom: 12px; border: 1px solid #e2e8f0;
        }
        .patient-header { display: flex; justify-content: space-between; align-items: center; }
        .wallet-bar { 
            background: #f1f5f9; height: 6px; border-radius: 3px; margin: 10px 0; overflow: hidden;
        }
        .wallet-fill { background: var(--success); height: 100%; width: 70%; }

        .btn-log { 
            width: 100%; background: var(--navy); color: white; border: none; 
            padding: 10px; border-radius: 10px; font-weight: 700; margin-top: 10px;
        }

        /* FEED */
        .section-tag { font-size: 0.7rem; font-weight: 800; color: #94a3b8; margin: 20px 0 10px 0; letter-spacing: 1px; }
        .log-item { 
            background: white; padding: 12px; border-radius: 12px; margin-bottom: 8px; 
            display: flex; justify-content: space-between; border-left: 4px solid var(--success);
        }
    </style>
</head>
<body>

    <div class="brand-band">
        <div class="logo-row">
            <div class="logo">⚡ FEE <span>SYNC</span></div>
            <div class="clinic-tag">DR. PRADEEP'S CLINIC</div>
        </div>
        <div class="label">Today's Revenue</div>
        <div class="main-total">₹<span id="grand-total">0</span></div>
    </div>

    <div class="mode-toggle">
        <button class="mode-btn active" id="btn-express" onclick="switchMode('express')">EXPRESS LOG</button>
        <button class="mode-btn" id="btn-patient" onclick="switchMode('patient')">THERAPY / WALLET</button>
    </div>

    <div class="content">
        <div id="view-express">
            <div class="section-tag">HIGH-VOLUME QUICK LOG</div>
            <div class="btn-grid">
                <div class="speed-card" onclick="logVisit(500, 'General Consult')">
                    <h3>₹500</h3><p>Consultation</p>
                </div>
                <div class="speed-card" onclick="logVisit(200, 'Follow Up')">
                    <h3>₹200</h3><p>Follow Up</p>
                </div>
                <div class="speed-card" onclick="logVisit(1000, 'Procedure')">
                    <h3>₹1k</h3><p>Procedure</p>
                </div>
                <div class="speed-card" onclick="logVisit(0, 'Custom')">
                    <h3>+</h3><p>Other Amt</p>
                </div>
            </div>
        </div>

        <div id="view-patient" class="hidden">
            <div class="section-tag">THERAPY SESSION TRACKING</div>
            
            <div class="patient-card">
                <div class="patient-header">
                    <div><b>Mr. Rahul Khanna</b><br><small>Ayurveda Treatment Plan</small></div>
                    <div style="text-align: right; color: var(--success); font-weight: 800;">₹4,500 <br><small style="color:#94a3b8">CREDIT</small></div>
                </div>
                <div class="wallet-bar"><div class="wallet-fill" style="width: 75%;"></div></div>
                <button class="btn-log" onclick="logVisit(1500, 'Session: Rahul')">LOG SESSION (Deduct ₹1,500)</button>
            </div>

            <div class="patient-card">
                <div class="patient-header">
                    <div><b>Ms. Priya Singh</b><br><small>Physiotherapy (10 Sessions)</small></div>
                    <div style="text-align: right; color: var(--accent); font-weight: 800;">-₹800 <br><small style="color:#94a3b8">DUE</small></div>
                </div>
                <button class="btn-log" style="background:var(--success)" onclick="logVisit(800, 'Payment: Priya')">COLLECT DUES (₹800)</button>
            </div>
        </div>

        <div class="section-tag">RECENT ACTIVITY</div>
        <div id="feed"></div>
    </div>

    <script>
        let total = 0;

        function switchMode(mode) {
            document.getElementById('view-express').classList.toggle('hidden', mode !== 'express');
            document.getElementById('view-patient').classList.toggle('hidden', mode !== 'patient');
            document.getElementById('btn-express').classList.toggle('active', mode === 'express');
            document.getElementById('btn-patient').classList.toggle('active', mode === 'patient');
        }

        function logVisit(amt, type) {
            if (type === 'Custom') {
                const c = prompt("Enter Amount:");
                if (!c) return;
                amt = parseInt(c);
            }
            total += amt;
            document.getElementById('grand-total').innerText = total.toLocaleString('en-IN');

            const item = document.createElement('div');
            item.className = 'log-item';
            item.innerHTML = `<div><b>${type}</b><br><small>${new Date().toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'})}</small></div> <b>+₹${amt}</b>`;
            document.getElementById('feed').prepend(item);
        }
    </script>
</body>
</html>
