<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>FeeSync Admin | Dr. Pradeep</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <style>
        :root { --primary: #6366f1; --red: #ff4d4d; --dark: #0f172a; --card: #1e293b; --text: #f8fafc; --accent: #22c55e; }
        body { font-family: 'Inter', system-ui, sans-serif; background: var(--dark); color: var(--text); margin: 0; display: flex; flex-direction: column; align-items: center; min-height: 100vh; padding-bottom: 50px; }
        
        .header { width: 100%; padding: 25px 0; text-align: center; background: linear-gradient(180deg, #1e1b4b 0%, var(--dark) 100%); border-bottom: 1px solid rgba(255,255,255,0.1); }
        .logo { font-size: 2.2rem; font-weight: 900; letter-spacing: -2.5px; }
        .logo span { color: var(--red); }
        .clinic-tag { font-size: 0.8rem; letter-spacing: 3px; color: var(--primary); font-weight: 800; text-transform: uppercase; margin-top: 5px; }

        .main-card { background: var(--card); width: 92%; max-width: 500px; border-radius: 40px; padding: 35px 24px; text-align: center; margin: 20px auto; box-shadow: 0 25px 50px rgba(0,0,0,0.5); border: 1px solid rgba(255,255,255,0.05); }
        
        /* Token & Stats */
        .token-circle { width: 160px; height: 160px; border: 6px solid var(--primary); border-radius: 50%; margin: 20px auto; display: flex; flex-direction: column; align-items: center; justify-content: center; box-shadow: 0 0 30px rgba(99, 102, 241, 0.2); }
        .token-val { font-size: 5rem; font-weight: 900; line-height: 1; color: #fff; }
        
        .ledger-panel { background: rgba(0,0,0,0.3); border-radius: 25px; padding: 20px; margin-top: 25px; border: 1px solid rgba(255,255,255,0.05); text-align: left; }
        .stat-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .stat-label { font-size: 0.65rem; color: #94a3b8; text-transform: uppercase; font-weight: 800; margin-bottom: 5px; }
        .stat-val { font-size: 1.4rem; font-weight: 800; color: var(--accent); }

        /* Next Up Section */
        .next-card { background: var(--primary); padding: 20px; border-radius: 25px; margin: 20px 0; text-align: left; position: relative; overflow: hidden; }
        .next-card::after { content: 'NEXT'; position: absolute; right: -10px; bottom: -10px; font-size: 4rem; font-weight: 900; opacity: 0.1; color: #fff; }

        /* Action Buttons */
        .btn { width: 100%; padding: 22px; border-radius: 22px; border: none; font-size: 1.15rem; font-weight: 900; cursor: pointer; transition: 0.2s; }
        .btn-call { background: #fff; color: var(--dark); box-shadow: 0 10px 20px rgba(0,0,0,0.2); }
        .btn-call:active { transform: scale(0.98); }
        
        /* Patient Audit List */
        .audit-list { width: 100%; margin-top: 25px; text-align: left; }
        .audit-item { display: flex; justify-content: space-between; align-items: center; padding: 12px 0; border-bottom: 1px solid rgba(255,255,255,0.05); font-size: 0.9rem; }
    </style>
</head>
<body>

    <div class="header">
        <div class="logo">FEE<span>SYNC</span></div>
        <div class="clinic-tag">DR. PRADEEP'S CLINIC</div>
    </div>

    <div class="main-card">
        <div style="font-size: 0.75rem; color: var(--accent); font-weight: 800; margin-bottom: 10px;">● MASTER LEDGER LIVE</div>
        
        <div class="token-circle">
            <span style="font-size: 0.6rem; color: var(--primary); font-weight: 800; text-transform: uppercase;">In Cabin</span>
            <div class="token-val" id="doc-token">0</div>
        </div>

        <div class="next-card">
            <div class="stat-label" style="color: rgba(255,255,255,0.7)">Up Next</div>
            <div id="next-patient-name" style="font-size: 1.5rem; font-weight: 900; color: #fff;">Waiting...</div>
        </div>

        <div class="ledger-panel">
            <div class="stat-grid">
                <div>
                    <div class="stat-label">Daily Revenue</div>
                    <div class="stat-val" id="total-revenue">₹0</div>
                </div>
                <div>
                    <div class="stat-label">Waiting List</div>
                    <div class="stat-val" id="wait-count">0</div>
                </div>
            </div>
        </div>

        <button class="btn btn-call" id="call-btn" onclick="callNext()" style="margin-top: 20px;">CALL NEXT PATIENT</button>

        <div class="audit-list" id="audit-trail">
            <div class="stat-label" style="margin-bottom: 10px;">Recent Consultations</div>
            </div>

        <button onclick="fullReset()" style="background:transparent; color:#64748b; border:none; margin-top:40px; text-decoration:underline; font-size:0.8rem; cursor:pointer; width:100%;">Reset for New Day</button>
    </div>

    <script>
        // 1. FIREBASE CONFIG
        const firebaseConfig = { 
  apiKey: "AIzaSyBKdMRrtS1Bgjs4BXPZfM13oT3zM16Nt0g",
  authDomain: "fee-sync.firebaseapp.com",
  databaseURL: "https://fee-sync-default-rtdb.firebaseio.com",
  projectId: "fee-sync",
  storageBucket: "fee-sync.firebasestorage.app",
  messagingSenderId: "572245525299",
  appId: "1:572245525299:web:facc4e8e7ba5dd0a913446"






            
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database().ref('fee_sync_final_v5');

        // 2. REAL-TIME DATA SYNC
        db.on('value', (snap) => {
            const data = snap.val() || { current: 0, last: 0, patients: {} };
            
            // Stats Update
            document.getElementById('doc-token').innerText = data.current;
            document.getElementById('total-revenue').innerText = "₹" + (data.current * 500);
            document.getElementById('wait-count').innerText = Math.max(0, data.last - data.current);
            
            // Next Patient Logic
            const nextIdx = data.current + 1;
            const nextP = (data.patients && data.patients[nextIdx]) ? data.patients[nextIdx].name : "No one waiting";
            document.getElementById('next-patient-name').innerText = nextP;

            // Audit Trail Logic (Last 3 seen)
            const auditDiv = document.getElementById('audit-trail');
            // Keep the label
            auditDiv.innerHTML = '<div class="stat-label" style="margin-bottom: 10px;">Recent Consultations</div>';
            
            for(let i = data.current; i > 0 && i > data.current - 3; i--) {
                const pName = (data.patients && data.patients[i]) ? data.patients[i].name : "Walk-in";
                auditDiv.innerHTML += `
                    <div class="audit-item">
                        <span>#${i} ${pName}</span>
                        <span style="color:var(--accent); font-weight:800;">₹500</span>
                    </div>`;
            }
        });

        // 3. ACTION: CALL NEXT
        function callNext() {
            const btn = document.getElementById('call-btn');
            btn.disabled = true;
            btn.innerText = "Processing...";

            db.transaction((data) => {
                data = data || { current: 0, last: 0 };
                // Sequence Guard: Don't call if no one has joined
                if (data.current < data.last) {
                    data.current = (data.current || 0) + 1;
                } else {
                    alert("The waiting list is empty. No tokens have been issued.");
                }
                return data;
            }, (err, comm) => {
                btn.disabled = false;
                btn.innerText = "CALL NEXT PATIENT";
            });
        }

        // 4. ACTION: RESET
        function fullReset() {
            if(confirm("DANGER: This will clear all patient records and revenue for today. Proceed?")) {
                db.set({ current: 0, last: 0, patients: {} });
            }
        }
    </script>
</body>
</html>
