<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bake Sync | Bakery Ledger</title>
    <style>
        :root { --brand: #d97706; --bg: #fffbeb; --card: #ffffff; --text: #333; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: var(--bg); color: var(--text); margin: 0; padding: 0; }
        .header { background: var(--brand); color: white; padding: 20px; text-align: center; font-size: 1.5rem; font-weight: bold; border-bottom-left-radius: 20px; border-bottom-right-radius: 20px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .container { padding: 20px; max-width: 600px; margin: 0 auto; }
        .summary-box { background: var(--card); padding: 20px; border-radius: 15px; text-align: center; box-shadow: 0 4px 10px rgba(0,0,0,0.05); margin-bottom: 20px; border: 1px solid #fde68a; }
        .summary-box h2 { margin: 0; font-size: 2rem; color: var(--brand); }
        
        .search-bar { width: 100%; padding: 15px; border-radius: 10px; border: 1px solid #ddd; margin-bottom: 20px; font-size: 1rem; box-sizing: border-box; outline: none; }
        
        .client-card { background: var(--card); border-radius: 15px; padding: 20px; margin-bottom: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); border-left: 5px solid var(--brand); }
        .client-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; }
        .client-name { font-size: 1.2rem; font-weight: bold; }
        .client-balance { color: #dc2626; font-weight: bold; }
        .client-balance.credit { color: #16a34a; }
        
        .btn-group { display: flex; gap: 10px; }
        .btn { flex: 1; padding: 10px; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; transition: 0.2s; }
        .btn-log { background: #fde68a; color: #b45309; }
        .btn-bill { background: var(--brand); color: white; }
        .btn-pay { background: #dcfce7; color: #16a34a; }
        
        /* Modal Styles */
        #modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); align-items: center; justify-content: center; }
        .modal-content { background: white; padding: 25px; border-radius: 15px; width: 80%; max-width: 350px; text-align: center; }
        .modal-content input { width: 100%; padding: 10px; margin: 10px 0; border: 1px solid #ddd; border-radius: 5px; box-sizing: border-box;}
    </style>
</head>
<body>

    <div class="header">🧁 Bake Sync</div>

    <div class="container">
        <div class="summary-box">
            <p style="margin-top:0; color:#666;">Total Pending Payments</p>
            <h2>₹4,500</h2>
        </div>

        <input type="text" class="search-bar" placeholder="🔍 Search clients (e.g., Priya)...">

        <div class="client-card">
            <div class="client-header">
                <div class="client-name">Priya Sharma <br><span style="font-size:0.8rem; color:#888; font-weight:normal;">📱 +91 98765 43210</span></div>
                <div class="client-balance">₹2,500 Due</div>
            </div>
            <p style="font-size:0.9rem; color:#555; margin-top:0;"><strong>Last Order:</strong> 2kg Truffle Cake</p>
            <div class="btn-group">
                <button class="btn btn-log" onclick="openModal('Log Order for Priya')">➕ Log Order</button>
                <button class="btn btn-bill" onclick="generateBill('Priya Sharma', 2500)">🧾 Send Bill</button>
                <button class="btn btn-pay" onclick="openModal('Record Payment from Priya')">💸 Received</button>
            </div>
        </div>

        <div class="client-card">
            <div class="client-header">
                <div class="client-name">Aarti Desai <br><span style="font-size:0.8rem; color:#888; font-weight:normal;">📱 +91 91234 56789</span></div>
                <div class="client-balance credit">₹500 Advance (Wallet)</div>
            </div>
            <p style="font-size:0.9rem; color:#555; margin-top:0;"><strong>Last Order:</strong> Assorted Cupcakes</p>
            <div class="btn-group">
                <button class="btn btn-log" onclick="openModal('Log Order for Aarti')">➕ Log Order</button>
                <button class="btn btn-bill" onclick="alert('No pending dues to bill!')">🧾 Send Bill</button>
                <button class="btn btn-pay" onclick="openModal('Record Payment from Aarti')">💸 Received</button>
            </div>
        </div>
    </div>

    <div id="modal">
        <div class="modal-content">
            <h3 id="modal-title">Action</h3>
            <input type="text" placeholder="Amount (₹)">
            <input type="text" placeholder="Description / Item">
            <button class="btn btn-bill" style="width:100%; margin-top:15px;" onclick="closeModal()">Save to Ledger</button>
            <button onclick="closeModal()" style="margin-top:10px; background:none; border:none; color:#888; cursor:pointer;">Cancel</button>
        </div>
    </div>

    <script>
        function openModal(title) {
            document.getElementById('modal-title').innerText = title;
            document.getElementById('modal').style.display = 'flex';
        }
        function closeModal() {
            document.getElementById('modal').style.display = 'none';
            alert("Action successfully saved to the single source of truth!");
        }
        function generateBill(name, amount) {
            alert(`MAGIC PREVIEW: \n\nGenerating beautiful PDF link for ${name}.\n\nIt will open WhatsApp with: "Hi ${name}, your bakery bill for ₹${amount} is ready. Click here to view and pay via UPI: bakesync.app/bill/123"`);
        }
    </script>
</body>
</html>
