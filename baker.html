<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bake Sync | Smart Bakery Ledger</title>
    <style>
        :root { --brand: #d97706; --bg: #fffbeb; --card: #ffffff; --text: #333; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: var(--bg); color: var(--text); margin: 0; padding: 0; padding-bottom: 40px; }
        .header { background: var(--brand); color: white; padding: 20px; text-align: center; font-size: 1.5rem; font-weight: bold; border-bottom-left-radius: 20px; border-bottom-right-radius: 20px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .container { padding: 20px; max-width: 600px; margin: 0 auto; }
        .summary-box { background: var(--card); padding: 20px; border-radius: 15px; text-align: center; box-shadow: 0 4px 10px rgba(0,0,0,0.05); margin-bottom: 20px; border: 1px solid #fde68a; }
        .summary-box h2 { margin: 0; font-size: 2rem; color: var(--brand); }
        
        .client-card { background: var(--card); border-radius: 15px; padding: 20px; margin-bottom: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); border-left: 5px solid var(--brand); }
        .client-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; }
        .client-name { font-size: 1.2rem; font-weight: bold; }
        .client-balance { color: #dc2626; font-weight: bold; }
        .client-balance.credit { color: #16a34a; }
        .client-balance.zero { color: #6b7280; }
        
        .btn-group { display: flex; gap: 10px; }
        .btn { flex: 1; padding: 10px; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; transition: 0.2s; font-size: 0.9rem; }
        .btn-log { background: #fde68a; color: #b45309; }
        .btn-bill { background: var(--brand); color: white; }
        .btn-pay { background: #dcfce7; color: #16a34a; }
        
        /* Modal Styles */
        #modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); align-items: center; justify-content: center; z-index: 1000; }
        .modal-content { background: white; padding: 25px; border-radius: 15px; width: 80%; max-width: 350px; text-align: center; }
        .modal-content input { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ddd; border-radius: 5px; box-sizing: border-box; font-size: 1rem; }
    </style>
</head>
<body>

    <div class="header">🧁 Bake Sync</div>

    <div class="container">
        <div class="summary-box">
            <p style="margin-top:0; color:#666;">Total Market Outstanding</p>
            <h2 id="total-outstanding">₹0</h2>
        </div>

        <div id="clients-container">
            </div>
        
        <div style="text-align: center; margin-top: 30px;">
            <button onclick="resetApp()" style="background: none; border: 1px solid #ddd; padding: 8px 15px; border-radius: 5px; color: #888; font-size: 0.8rem; cursor: pointer;">🔄 Reset Demo Data</button>
        </div>
    </div>

    <div id="modal">
        <div class="modal-content">
            <h3 id="modal-title">Action</h3>
            <p id="modal-subtitle" style="color: #666; font-size: 0.9rem; margin-top: -10px; margin-bottom: 15px;"></p>
            
            <input type="number" id="input-amount" placeholder="Amount (₹)" required>
            <input type="text" id="input-desc" placeholder="Details (e.g. 1kg Truffle)" required>
            
            <button class="btn btn-bill" style="width:100%; margin-top:15px; padding: 12px;" onclick="executeAction()">Save to Ledger</button>
            <button onclick="closeModal()" style="margin-top:15px; background:none; border:none; color:#888; cursor:pointer; font-weight: bold;">Cancel</button>
        </div>
    </div>

    <script>
        // --- 1. THE DATABASE V2 (Forcing a fresh start) ---
        let clients = JSON.parse(localStorage.getItem('bakerClientsV2'));

        // If no data exists, inject dummy data for the demo
        if (!clients) {
            clients = [
                { id: 1, name: "Priya Sharma", phone: "919876543210", balance: 2500, lastOrder: "2kg Truffle Cake" },
                { id: 2, name: "Aarti Desai", phone: "919123456789", balance: -500, lastOrder: "Assorted Cupcakes" }
            ];
            saveData();
        }

        let currentAction = ""; 
        let currentClientId = null;

        // --- 2. RENDER THE APP ---
        function renderApp() {
            const container = document.getElementById('clients-container');
            container.innerHTML = "";
            let totalPending = 0;

            clients.forEach(client => {
                // Calculate Total Market Outstanding (only positive balances)
                if (client.balance > 0) totalPending += client.balance;

                // Format Balance Colors & Text
                let balanceHTML = "";
                if (client.balance > 0) {
                    balanceHTML = `<div class="client-balance">₹${client.balance} Due</div>`;
                } else if (client.balance < 0) {
                    balanceHTML = `<div class="client-balance credit">₹${Math.abs(client.balance)} Advance</div>`;
                } else {
                    balanceHTML = `<div class="client-balance zero">Settled</div>`;
                }

                // Create the Card HTML
                const card = document.createElement('div');
                card.className = "client-card";
                card.innerHTML = `
                    <div class="client-header">
                        <div class="client-name">${client.name} <br><span style="font-size:0.8rem; color:#888; font-weight:normal;">📱 +${client.phone}</span></div>
                        ${balanceHTML}
                    </div>
                    <p style="font-size:0.9rem; color:#555; margin-top:0;"><strong>Last Entry:</strong> ${client.lastOrder}</p>
                    <div class="btn-group">
                        <button class="btn btn-log" onclick="openModal('add', ${client.id}, '${client.name}')">➕ Log Order</button>
                        <button class="btn btn-bill" onclick="sendWhatsApp(${client.id})">🧾 Send Bill</button>
                        <button class="btn btn-pay" onclick="openModal('pay', ${client.id}, '${client.name}')">💸 Received</button>
                    </div>
                `;
                container.appendChild(card);
            });

            document.getElementById('total-outstanding').innerText = `₹${totalPending}`;
        }

        // --- 3. THE MATH ENGINE ---
        function openModal(action, id, name) {
            currentAction = action;
            currentClientId = id;
            
            document.getElementById('input-amount').value = '';
            document.getElementById('input-desc').value = '';

            if (action === 'add') {
                document.getElementById('modal-title').innerText = "Log New Order";
                document.getElementById('modal-subtitle').innerText = `Adding to ${name}'s bill.`;
                document.getElementById('input-desc').style.display = 'block';
            } else {
                document.getElementById('modal-title').innerText = "Record Payment";
                document.getElementById('modal-subtitle').innerText = `Receiving from ${name}.`;
                document.getElementById('input-desc').style.display = 'none';
            }
            
            document.getElementById('modal').style.display = 'flex';
        }

        function closeModal() {
            document.getElementById('modal').style.display = 'none';
        }

        function executeAction() {
            const amount = parseInt(document.getElementById('input-amount').value);
            const desc = document.getElementById('input-desc').value;
            
            if (!amount || amount <= 0) {
                alert("Please enter a valid amount.");
                return;
            }

            // Find the client in our database
            const clientIndex = clients.findIndex(c => c.id === currentClientId);

            // Do the Math
            if (currentAction === 'add') {
                clients[clientIndex].balance += amount;
                clients[clientIndex].lastOrder = desc || "New Order";
            } else if (currentAction === 'pay') {
                clients[clientIndex].balance -= amount;
                clients[clientIndex].lastOrder = `Paid ₹${amount}`;
            }

            saveData();
            closeModal();
            renderApp();
        }

        // --- 4. THE WHATSAPP PIPELINE ---
        function sendWhatsApp(id) {
            const client = clients.find(c => c.id === id);
            
            if (client.balance <= 0) {
                alert(`${client.name} has no pending dues! Their balance is completely settled.`);
                return;
            }

            const text = `*BAKE SYNC INVOICE*\n\nHi ${client.name},\nYour bakery order statement is ready.\n\n*Total Pending: ₹${client.balance}*\n\nPlease click the link below to view your full receipt and pay directly via UPI:\nhttps://bakesync.app/pay/demolink123\n\nThank you!`;
            const encodedText = encodeURIComponent(text);
            window.open(`https://wa.me/${client.phone}?text=${encodedText}`, '_blank');
        }

        // Helper to save data to the phone
        function saveData() {
            localStorage.setItem('bakerClientsV2', JSON.stringify(clients));
        }

        // Hard Reset Function
        function resetApp() {
            localStorage.removeItem('bakerClientsV2');
            location.reload();
        }

        // Boot up the app
        renderApp();

    </script>
</body>
</html>
